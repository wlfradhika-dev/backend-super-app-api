docs: |+
  ## History

  Returns the historical records for the authenticated user.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (JSON)

  ```json
  {
      "filter_type": 1,
      "order_status": "4",
      "service_category": "13",
      "per_page": 10,
      "page": 1
  }
  ```

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "status": 1,
      "message": "Success",
      "message_code": 1,
      "current_page": 1,
      "last_page": 1,
      "total": 1,
      "order_list": [
          {
              "order_id": "bf825b44-1884-4888-80e6-9ecd7e853d1b",
              "order_no": "72442231",
              "category_id": 13,
              "category_type": 4,
              "category_name": "Dog walking",
              "category_icon": "http://localhost:8004/assets/images/service-category/10060120251301.png",
              "schedule_order_date": "2026-03-12",
              "schedule_order_time": "11:00:00 - 12:00:00",
              "total_pay": 179.1,
              "provider_name": "Ellen Ripley",
              "order_status": 1,
              "package_list": "Standard Dog Walk",
              "delivery_address": "Rajkot City Center, Rajkot, Gujarat",
              "user_rating": 0,
              "service_type": 1
          }
      ]
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

