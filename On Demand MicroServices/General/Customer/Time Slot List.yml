docs: |+
  ## Time Slot List

  Returns a paginated list of records matching the request criteria.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (JSON)

  ```json
  {
      "provider_id": "{{provider_id}}",
      "select_date": "2026-03-11",
      "service_type": 1
  }
  ```

  ---

