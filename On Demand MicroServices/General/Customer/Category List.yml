docs: |+
  ## Category List

  Returns a paginated list of records matching the request criteria.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (JSON)

  ```json
  {
      "service_category_id": 13
  }
  ```

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "category_list": [
          {
              "category_id": "68f67a8d-cba8-4d81-9b56-ef8fbdcf43bc",
              "category_name": "Dog Walking",
              "category_icon": "http://localhost:8004/assets/images/service-category/other-service-sub-category/dog-walking.png"
          }
      ],
      "service_category_banner": "http://localhost:8004/storage/img/service-category/10060120251301.png"
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

