docs: |+
  ## Provider Detail

  Returns the detailed information of the specified record.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (JSON)

  ```json
  {
      "provider_id": "{{provider_id}}",
      "service_category_id": 13,
      "lat": 22.3039,
      "long": 70.8022
  }
  ```

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "provider_id": "ed64fa6f-9084-48ab-b061-86c70a084828",
      "provider_name": "Ellen Ripley",
      "provider_profile_image": "",
      "provider_gender": 0,
      "average_rating": 0,
      "distance": 0,
      "total_completed_order": 0,
      "service_category_name": "Dog walking",
      "service_category_icon": "http://localhost:8004/storage/img/service-category/10060120251301.png",
      "is_allowed_provider_location": 0,
      "provider_address": "Rajkot City Center, Rajkot, Gujarat",
      "provider_flat_no": "",
      "provider_landmark": "Rajkot",
      "provider_lat": "22.3039",
      "provider_long": "70.8022",
      "no_of_ratings": 0
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

