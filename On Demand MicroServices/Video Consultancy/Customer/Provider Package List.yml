docs: |+
  ## Provider Package List

  Returns a paginated list of records matching the request criteria.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (JSON)

  ```json
  {
      "provider_id": "{{provider_uuid}}",
      "service_category_id": 13
  }
  ```

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "package_list": [
          {
              "category_id": "651f0652-57d1-4379-b273-4740e480c267",
              "category_name": "Dog dancing",
              "category_package_list": [
                  {
                      "id": "123f0652-57d1-4379-b273-4740e480c267",
                      "name": "Dog fish dance",
                      "description": "dance make mood change and feel energetic",
                      "price": 100,
                      "max_book_quantity": 3,
                      "category_id": "651f0652-57d1-4379-b273-4740e480c267",
                      "category_name": "Dog dancing"
                  }
              ]
          }
      ]
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

