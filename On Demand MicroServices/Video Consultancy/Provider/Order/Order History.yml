docs: |+
  ## Order History

  Returns the historical records for the authenticated user.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (JSON)

  ```json
  {
      "timezone": "Asia/Kolkata",
      "filter_type": 0,
      "per_page": 10
  }
  ```

  ---

