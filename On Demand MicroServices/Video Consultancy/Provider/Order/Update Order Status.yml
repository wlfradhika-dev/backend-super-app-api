http:
  method: POST
  url: "{{on_deman_url}}/api/provider/video-consultancy/orders/update-status"
  headers:
    - name: Accept
      value: application/json
  body:
    type: multipart-form
    data:
      - name: order_id
        type: text
        value: "{{order_uuid}}"
      - name: update_status
        type: text
        value: ""
      - name: reason
        type: text
        value: Schedule conflict
        disabled: true
  auth:
    type: bearer
    token: "{{provider_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

