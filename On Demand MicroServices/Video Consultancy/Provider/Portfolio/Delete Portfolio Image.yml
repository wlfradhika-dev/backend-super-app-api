docs: |+
  ## Delete Portfolio Image

  Permanently deletes the specified record.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (JSON)

  ```json
  {
      "image_id": "{{image_id}}"
  }
  ```

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "provider_service_gallery": [
          {
              "id": "8127ac6c-081f-4b83-96d5-518b698c9a34",
              "service_category_id": 14,
              "provider_id": "c8cba12a-1775-44f2-8f97-24c7e79faaf2",
              "portfolio_image": "http://localhost:8004/storage/img/provider-portfolio-images/Grhx0KYUmH9567cH.jpg"
          }
      ]
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
