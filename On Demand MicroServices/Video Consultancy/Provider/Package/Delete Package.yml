docs: |+
  ## Delete Package

  Permanently deletes the specified record.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (JSON)

  ```json
  {
      "provider_service_id": "{{provider_service_uuid}}",
      "package_id": "{{package_uuid}}"
  }
  ```

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "package_list": [
          {
              "category_id": "0ca19388-2916-406f-8e50-ca630e0cb95e",
              "category_name": "General Consultation",
              "packages": [
                  {
                      "package_id": "ab9060c7-c27e-49cc-a5ff-7704a1f3ed0f",
                      "package_name": "Premium Consultation",
                      "package_description": "45 minute video consultation",
                      "package_max_book_quantity": 3,
                      "package_price": 100,
                      "package_status": 0
                  }
              ]
          }
      ]
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

