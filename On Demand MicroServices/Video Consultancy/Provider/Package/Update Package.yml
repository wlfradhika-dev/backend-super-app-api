http:
  method: POST
  url: "{{on_deman_url}}/api/provider/video-consultancy/packages/add-update"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
          "provider_service_id": "{{provider_service_uuid}}",
          "category_id": "{{sub_category_uuid}}",
          "package_name": "Premium Consultation",
          "package_description": "45 minute video consultation",
          "package_price": 100.00,
          "max_book_quantity": 3,
          "package_id": "{{existing_package_uuid}}"
      }
  auth:
    type: bearer
    token: "{{provider_token}}"

