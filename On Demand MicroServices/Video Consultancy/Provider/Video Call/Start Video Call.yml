docs: |+
  ## Start Video Call

  Initiates or manages an audio/video call session using the 100ms platform.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `receiver_id` | string | Yes | Receiver id |
  | `call_type` | string | Yes | Call type |
  | `service_category_id` | string | Yes | Service category id |
  | `order_id` | string | Yes | Order id |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "sender_token": "eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9..Yuk0GkK5Rjyher8Wht00kK3TRg74m8tKc6pIufWxlhA",
      "room_id": "mock-room-34872e32-4b19-419b-8fbe-bf7ae39b997b",
      "order_admin_video_call_time_limit": 60,
      "order_used_video_call_time_limit": 20,
      "admin_daily_user_video_call_time_limit": 120,
      "daily_user_video_call_time_limit": 10,
      "over_all_call_limit": 40
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The receiver id field is required."
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

