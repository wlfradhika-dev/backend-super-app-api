docs: |+
  ## Provider List

  Returns a paginated list of records matching the request criteria.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (JSON)

  ```json
  {
      "service_category_id": 13,
      "sub_category_id": "57cde8b4-ef0f-4b19-9d5f-ea0954032780",
      "lat": 22.3039,
      "long": 70.8022
    }
  ```

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "provider_list": [
          {
              "provider_id": "ed64fa6f-9084-48ab-b061-86c70a084828",
              "provider_name": "Ellen Ripley",
              "provider_profile_image": null,
              "provider_gender": 0,
              "average_rating": 0,
              "num_of_rating": 0,
              "no_of_ratings": 0,
              "distance": "0.00",
              "total_completed_order": 0,
              "is_allowed_provider_location": 0,
              "package_list": [
                  {
                      "package_name": "Standard Dog Walk",
                      "package_price": 199
                  }
              ]
          }
      ]
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

