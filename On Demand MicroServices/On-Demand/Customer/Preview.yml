docs: |+
  ## Preview

  Performs the requested operation and returns the result.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (JSON)

  ```json
  {
      "service_category_id": 13,
      "provider_id": "{{provider_id}}",
      "address": "713ce540-c11d-41df-a309-cf186e7de40d",
      "package_id_list": "65a288d7-cad1-4d03-b22c-60318e2a3197",
      "package_quantity_list": "1",
      "payment_type": 1,
      "promo_code":"PROMO20",
      "is_loyalty_discount": 0
  }
  ```

