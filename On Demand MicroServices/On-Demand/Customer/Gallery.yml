docs: |+
  ## Gallery

  Performs the requested operation and returns the result.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (JSON)

  ```json
  {
      "provider_id": "{{provider_id}}",
      "service_category_id": 13
  }
  ```

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "portfolio_images": [
          {
              "id": "a0c5d9b8-aede-4bb2-aa96-fed1b83148be",
              "provider_portfolio_image": "http://localhost:8004/storage/img/provider-portfolio-images/XlhM6748dk95r6rB.jpg"
          }
      ]
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

