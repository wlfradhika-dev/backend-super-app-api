docs: |+
  ## Provider Package List

  Returns a paginated list of records matching the request criteria.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (JSON)

  ```json
  {
      "provider_id": "80e42040-a9df-4d89-af4e-ec0f49a15180",
      "service_category_id": 13
  }
  ```

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "package_list": [
          {
              "category_id": "68f67a8d-cba8-4d81-9b56-ef8fbdcf43bc",
              "category_name": "Dog Walking",
              "category_package_list": [
                  {
                      "id": "65a288d7-cad1-4d03-b22c-60318e2a3197",
                      "name": "Standard Dog Walk",
                      "description": "30 minute dog walking service",
                      "price": 199,
                      "max_book_quantity": 1,
                      "category_id": "68f67a8d-cba8-4d81-9b56-ef8fbdcf43bc",
                      "category_name": "Dog Walking"
                  }
              ]
          }
      ]
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

