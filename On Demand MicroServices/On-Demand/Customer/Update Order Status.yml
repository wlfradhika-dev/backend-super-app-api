docs: |+
  ## Update Order Status

  Updates an existing record with the provided details.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (JSON)

  ```json
  {
      "order_id": "{{order_uuid}}",
      "update_status": 6
  }
  ```

