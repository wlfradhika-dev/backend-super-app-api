docs: |+
  ## Review List

  Returns a paginated list of records matching the request criteria.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (JSON)

  ```json
  {
      "provider_id": "{{provider_id}}",
      "service_category_id": 13,
      "page": 1,
      "per_page": 15
  }
  ```

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "provider_review_list": [
          {
              "user_id": "b5e6b428-0026-4f3a-a349-34510d29b526",
              "user_name": "Tony Stark",
              "user_profile_image": "http://localhost:8004/storage/img/profile-images/customer/tony-stark.png",
              "rating": 4.5,
              "comment": "Great walk, on time!",
              "ratting_date": "2026-03-11 17:12:28"
          }
      ],
      "total_page": 1,
      "per_page": 15,
      "current_page": 1
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

