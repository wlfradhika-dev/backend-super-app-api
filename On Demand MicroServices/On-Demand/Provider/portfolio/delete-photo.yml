docs: |+
  ## delete-photo

  Permanently deletes the specified record.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (JSON)

  ```json
  {
    "image_id": "{{PORTFOLIO_IMAGE_UUID}}"
  }
  ```

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "provider_service_gallery": [
          {
              "id": "931e194d-b10d-4688-8e90-35c955efd6cc",
              "service_category_id": 13,
              "provider_id": "03209267-afc0-49f5-bea5-2a72319d06a3",
              "portfolio_image": "http://localhost:8004/storage/img/provider-portfolio-images/OG6WDe6mpUeTuS7x.jpg"
          }
      ]
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

