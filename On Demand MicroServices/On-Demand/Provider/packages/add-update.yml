docs: |+
  ## add-update

  Creates a new record with the provided details.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (JSON)

  ```json
  {
    "provider_service_id": "{{PROVIDER_SERVICE_UUID}}",
    "category_id": "{{SUB_CATEGORY_UUID}}",
    "package_name": "Basic grooming",
    "package_description": "Full body grooming service",
    "package_price": 25.50,
    "max_book_quantity": 5,
    "category_type": 3
  }
  ```

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

