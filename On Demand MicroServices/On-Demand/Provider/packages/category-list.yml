docs: |+
  ## category-list

  Returns a paginated list of records matching the request criteria.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (JSON)

  ```json
  {
    "provider_service_id": "{{PROVIDER_SERVICE_UUID}}"
  }
  ```

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "category_list": [
          {
              "category_id": "a06058f1-868d-4bcb-9201-c1ac27acdee6",
              "category_name": "Pet Daycare"
          },
          {
              "category_id": "1fe9c174-809f-418d-a45c-164ea016107a",
              "category_name": "Pet Grooming"
          },
          {
              "category_id": "edf0619d-6f07-4de3-a8c2-da8175cc93a0",
              "category_name": "Pet Training"
          },
          {
              "category_id": "1bf72632-ba16-4f11-bb9e-fa533384f281",
              "category_name": "Pet Walker"
          }
      ]
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

