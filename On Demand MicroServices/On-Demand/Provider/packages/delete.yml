docs: |+
  ## delete

  Permanently deletes the specified record.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (JSON)

  ```json
  {
    "provider_service_id": "{{PROVIDER_SERVICE_UUID}}",
    "package_id": "{{PACKAGE_UUID}}"
  }
  ```

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "package_list": [
          {
              "category_id": "1fe9c174-809f-418d-a45c-164ea016107a",
              "category_name": "Pet Grooming",
              "packages": [
                  {
                      "package_id": "faabc6b4-4c16-49e4-94a7-2b2d39972b2e",
                      "package_name": "Basic Grooming",
                      "package_description": "Full body grooming service",
                      "package_max_book_quantity": 5,
                      "package_price": 25.5,
                      "package_status": 1
                  }
              ]
          },
          {
              "category_id": "1bf72632-ba16-4f11-bb9e-fa533384f281",
              "category_name": "Pet Walker",
              "packages": [
                  {
                      "package_id": "2d7c1a31-be87-41a9-8413-3ecdb8a7b006",
                      "package_name": "Basic",
                      "package_description": "Full body grooming service",
                      "package_max_book_quantity": 5,
                      "package_price": 25.5,
                      "package_status": 1
                  }
              ]
          }
      ]
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

