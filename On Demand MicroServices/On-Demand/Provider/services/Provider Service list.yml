docs: |+
  ## Provider Service list

  Returns a paginated list of records matching the request criteria.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (JSON)

  ```json
  {
      "service_category_id": 13,
      "sub_category_id": "651f0652-57d1-4379-b273-4740e480c267",
      "lat": "23.0225",
      "long": "72.5714"
  }
  ```

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "provider_service_list": [
          {
              "provider_service_id": "701f0652-57d1-4379-b273-4740e480c267",
              "provider_service_name": "Dog walking",
              "provider_service_status": 1,
              "provider_service_current_status": 1,
              "service_category_id": 13,
              "category_type": 4,
              "provider_doc_status": 1,
              "provider_service_gallery": []
          }
      ]
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

