info:
  name: update-status
  type: http
  seq: 1

http:
  method: POST
  url: "{{on_deman_url}}/api/provider/on-demand/orders/update-status"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
      disabled: true
  body:
    type: multipart-form
    data:
      - name: order_id
        type: text
        value: "{{ORDER_UUID}}"
      - name: update_status
        type: text
        value: "9"
      - name: extra_amount
        type: text
        value: "0"
        description: require if update_status = 9
      - name: description
        type: text
        value: extra amount
        description: require if extra amount > 0
        disabled: true
  auth:
    type: bearer
    token: "{{provider_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

