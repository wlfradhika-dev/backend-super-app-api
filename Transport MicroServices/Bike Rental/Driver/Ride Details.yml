docs: |+
  ## Ride Details

  Returns the detailed information of the specified record.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (JSON)

  ```json
  {
      "service_category_id": 7,
      "ride_id": "99f11463-8fef-4e1e-a934-d565e7039596"
    }
  ```

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "ride_details": {
          "ride_id": "99f11463-8fef-4e1e-a934-d565e7039596",
          "user_id": "62ab01b5-e364-4048-b89b-ec867bcf69e7",
          "user_fcm_token": "",
          "booking_no": "95450308",
          "service_category_id": 7,
          "user_profile_image": "",
          "user_name": "Demo",
          "rating": 0,
          "contact_number": "+919999999999",
          "address_list": [
              {
                  "address": "Jubilee Circle, Rajkot",
                  "address_lat": "22.319033",
                  "address_long": "70.767158"
              },
              {
                  "address": "Race Course, Rajkot",
                  "address_lat": "22.325",
                  "address_long": "70.77"
              }
          ],
          "sos_contact_list": [],
          "flat_no": "",
          "landmark": "",
          "pickup_date_time": "2026-03-10T11:44:18.000000Z",
          "cancel_by": "",
          "service_date_time": "2026-03-10 11:17:47",
          "total_amount": 1056,
          "payment_type": 1,
          "ride_status": 9,
          "promocode_discount": 0,
          "promocode_name": "",
          "otp": "",
          "ride_chat_number": "95450308-99f11463-8fef-4e1e-a934-d565e7039596"
      },
      "is_toll_charge": 1
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

