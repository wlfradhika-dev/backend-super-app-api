docs: |+
  ## Ride History

  Returns the historical records for the authenticated user.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (JSON)

  ```json
  {
      "timezone": "Asia/Kolkata",
      "filter_type": 0,
      "service_category": "7",
      "order_status": "2"
    }
  ```

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "current_page": 1,
      "last_page": 1,
      "total": 1,
      "total_revenues": 240,
      "completed_ride": 1,
      "total_ride": 1,
      "cancelled_ride": 0,
      "ride_history": [
          {
              "ride_id": "99f11463-8fef-4e1e-a934-d565e7039596",
              "driver_pay_settle_status": 0,
              "service_category_id": 7,
              "service_category_name": "Car Rental",
              "service_category_icon": "http://localhost:8002/storage/img/service-category/11362120242806.png",
              "vehicle_type_name": "Street",
              "vehicle_type_icon_name": "",
              "ride_status": 9,
              "ride_date_time": "2026-03-10 11:44:18",
              "ride_amount": "240.00",
              "ride_date": "10 Mar, 2026",
              "ride_time": "11:44",
              "service_date_time": "2026-03-10 11:17:47",
              "schedule_service_date_time": "2026-03-10 11:44:18",
              "total_km": 25,
              "rating": 0,
              "ride_no": "95450308"
          }
      ]
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

