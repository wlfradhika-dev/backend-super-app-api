docs: |+
  ## Service Type

  Performs the requested operation and returns the result.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (JSON)

  ```json
  {
      "address_list": [
        {"address_lat": 22.319033, "address_long": 70.767158, "time": "2026-03-09 11:00:00"},
        {"address_lat": 22.320100, "address_long": 70.768200, "time": "2026-03-09 11:30:00"}
      ],
      "current_lat": 22.319033,
      "current_long": 70.767158,
      "total_km": 2.5,
      "is_loyalty_discount": 0
    }
  ```

