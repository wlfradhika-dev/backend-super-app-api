docs: |+
  ## Ride Booking

  Performs the requested operation and returns the result.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (JSON)

  ```json
  {
    "service_category_id": 7,
    "vehicle_type_id": "{{BIKE_VEHICLE_TYPE_ID}}",
    "pickup_lat": 22.3189,
    "pickup_long": 70.7673,
    "drop_lat": 22.2863,
    "drop_long": 70.7720,
    "pickup_location": "Bus Stop, 150 Feet Ring Rd, near Sheetalpark, Sheetal Park, Manharpura 1, Madhapar, Rajkot, Gujarat 360006",
    "drop_location": "7QPC+GR2, 150 Feet Ring Rd, Rajkot, Gujarat 360005",
    "start_date_time": "2026-03-07 10:00:00",
    "end_date_time": "2026-03-07 14:00:00",
    "total_km": 15,
    "payment_type": 1
  }
  ```

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "status_code": 1,
      "https_status_code": 200,
      "data": {
          "ride_id": "ba8463f4-f1a6-47dc-a3de-11b1bc3f7b6a",
          "accept_time_out": 20
      }
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

