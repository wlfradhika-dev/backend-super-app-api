docs: |+
  ## Ride Preview

  Performs the requested operation and returns the result.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (JSON)

  ```json
  {
      "service_category_id": 7,
      "vehicle_type_id": "18091cc1-989f-4fe7-bb10-178297c35157",
      "start_date_time": "2026-03-11 10:00:00",
      "end_date_time": "2026-03-11 18:00:00",
      "total_km": 2.5,
      "promo_code": "BIKERIDE50"
  }
  ```

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "status_code": 1,
      "https_status_code": 200,
      "data": {
          "travel_hour": "8 hours",
          "free_travel_km": 80,
          "amount_per_hour": 120,
          "subtotal": 718,
          "refer_discount": 192,
          "ride_fare": 960,
          "additional_fare": 0,
          "discount_cost": 0,
          "promocode_discount": 50,
          "promocode_name": "BIKERIDE50",
          "tax_cost": 71.8,
          "total_pay": 789.8,
          "redeem_loyalty_points": 0,
          "loyalty_discount_amount": 0,
          "document_uploaded": 1,
          "document_message": ""
      }
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

