      value: Bearer 3|3hXKAJbE8Jv91iCOGKaDvzFY145fbN56Vnkdau2Gefceca70
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
          "service_category_id": 7,
          "vehicle_type_id": "18091cc1-989f-4fe7-bb10-178297c35157",
          "start_date_time": "2026-03-11 10:00:00",
          "end_date_time": "2026-03-11 18:00:00",
          "total_km": 2.5,
          "promo_code": "BIKERIDE50"
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

