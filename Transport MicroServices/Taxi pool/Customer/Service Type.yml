docs: |+
  ## Service Type

  Performs the requested operation and returns the result.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `service_category_id` | string | Yes | Service category id |
  | `current_lat` | string | Yes | Current lat |
  | `current_long` | string | Yes | Current long |
  | `address_list` | string | Yes | Address list |
  | `promo_code` | string | Yes | Promo code |
  | `selected_vehicle_id` | string | Yes | Selected vehicle id |
  | `handicap` | string | Yes | Handicap |
  | `child_seat` | string | Yes | Child seat |
  | `gender` | string | Yes | Gender |
  | `pickup_date_time` | string | Yes | Pickup date time |
  | `is_loyalty_discount` | string | Yes | Is loyalty discount |
  | `booked_seats` | string | Yes | Booked seats |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "arrived_time": "08:32 AM",
      "way_point_time": [],
      "total_duration": 587,
      "promo_message_code": 0,
      "promo_code_message": "",
      "service_type": [
          {
              "id": "2ac9196a-c594-4b91-8874-55df8c919085",
              "service_name": "SUV",
              "image": "http://127.0.0.1:8001/assets/images/service-category/transport-service-type/258200720241007.png",
              "way_point_time": [],
              "cost_per_km": 10,
              "weight_limit": 0,
              "dimension_limit": "0",
              "base_fare": 10,
              "cost_per_min": 10,
              "width_limit": 0,
              "height_limit": 0,
              "min_fare_amount": 10,
              "currency_ratio": 1,
              "service_status": 0,
              "arrived_time": "08:32 AM",
              "ride_amount": 146.03,
              "total_duration": 0,
              "total_distance": 3.82,
              "eta": 9.783333333333333,
              "surcharge_charge_status": 0,
              "surcharge_cost": 0,
              "no_of_seat": 0
          }
      ],
      "is_toll_charge": 1
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The service category id field is required."
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

