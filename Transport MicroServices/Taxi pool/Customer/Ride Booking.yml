docs: |+
  ## Ride Booking

  Performs the requested operation and returns the result.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `ride_id` | string | Yes | Ride id |
  | `service_category_id` | string | Yes | Service category id |
  | `payment_type` | string | Yes | Payment type |
  | `estimated_time` | string | Yes | Estimated time |
  | `total_distance` | string | Yes | Total distance |
  | `vehicle_type_id` | string | Yes | Vehicle type id |
  | `address_list` | string | Yes | Address list |
  | `promo_code` | string | Yes | Promo code |
  | `selected_vehicle_id` | string | Yes | Selected vehicle id |
  | `handicap` | string | Yes | Handicap |
  | `child_seat` | string | Yes | Child seat |
  | `gender` | string | Yes | Gender |
  | `pickup_date_time` | string | Yes | Pickup date time |
  | `is_loyalty_discount` | string | Yes | Is loyalty discount |
  | `additional_remarks` | string | Yes | Additional remarks |
  | `booked_seats` | string | Yes | Booked seats |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "ride_id": "c94ff5c5-23b8-4f27-a4ae-0eba05ae4d3c",
      "booking_no": "87980352",
      "pickup_date_time": "14 Feb, 2026",
      "pickup_address": "8Q89+83F, 150 Feet Ring Rd, Shastri Nagar, Dharam Nagar,Rajkot,Gujarat",
      "destination_address": "7QPF+F2 Rajkot,Gujarat",
      "ride_status": 0,
      "accept_time_out": 20
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The ride id field is required."
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

