docs: |+
  ## Start Request

  Performs the requested operation and returns the result.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `request_id` | string | Yes | Request id |
  | `service_category_id` | string | Yes | Service category id |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "driver_current_status": 1,
      "ride_details": {
          "ride_id": "ff3bfb5c-4995-4004-ac78-017bdf51a61a",
          "user_id": "ba055fb9-bc3e-400c-ba40-37bd5d0a302a",
          "user_fcm_token": null,
          "booking_no": "23998648",
          "service_category_id": 6,
          "user_profile_image": "",
          "user_name": "Dk",
          "contact_number": "246810",
          "address_list": [
              {
                  "address": "8Q89+83F, 150 Feet Ring Rd, Shastri Nagar, Dharam Nagar,Rajkot,Gujarat",
                  "address_lat": "22.3158003",
                  "address_long": "70.7650816"
              },
              {
                  "address": "7QPF+F2 Rajkot,Gujarat",
                  "address_lat": "22.2862485",
                  "address_long": "70.7699514"
              }
          ],
          "flat_no": "",
          "landmark": "",
          "pickup_datetime": "2026-02-18T08:49:20.000000Z",
          "total_amount": 210,
          "payment_type": 1,
          "ride_status": 2,
          "way_point_status": 0
      }
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The request id field is required."
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

