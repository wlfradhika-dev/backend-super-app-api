docs: |+
  ## Ride Feedback

  Performs the requested operation and returns the result.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `ride_id` | string | Yes | Ride id |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "current_page": 1,
      "last_page": 1,
      "total": 1,
      "feedback_list": [
          {
              "rating_id": "6de0a376-1db8-43f6-a556-1abe5b33cfad",
              "service_cat_id": 6,
              "ride_id": "dd0c5cfd-60a4-41ac-9ad7-7b94c8edd26b",
              "user_name": "Dk",
              "user_profile_image": "",
              "rating": 5,
              "comment": "",
              "service_category_name": "Taxi Pool",
              "datetime": "2026-02-17 12:05:15",
              "dt": "2026-02-17 12:05:15"
          }
      ]
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The ride id field is required."
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

