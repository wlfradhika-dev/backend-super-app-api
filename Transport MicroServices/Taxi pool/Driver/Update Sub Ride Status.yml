docs: |+
  ## Update Sub Ride Status

  Updates an existing record with the provided details.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `service_category_id` | string | Yes | Service category id |
  | `ride_id` | string | Yes | Ride id |
  | `sub_ride_id` | string | Yes | Sub ride id |
  | `user_id` | string | Yes | User id |
  | `ride_status` | string | Yes | Ride status |
  | `way_point_status` | string | Yes | Way point status |
  | `reason_id` | string | Yes | Reason id |
  | `otp` | string | Yes | Otp |
  | `toll_charge` | string | Yes | Toll charge |
  | `no_of_toll` | string | Yes | No of toll |
  | `total_amount` | string | Yes | Total amount |
  | `rating` | string | Yes | Rating |
  | `comment` | string | Yes | Comment |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "service_category_id": 6,
      "ride_id": "65617e4a-56fb-469a-bd9f-bb4f59463eca",
      "ride_status": 9,
      "way_point_status": 0,
      "ride_completed_status": 0,
      "ride_cancelled_status": 0,
      "driver_current_status": 1,
      "cancel_by": ""
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The service category id field is required."
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

