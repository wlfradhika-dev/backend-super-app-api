docs: |+
  ## Update Ride Status

  Updates an existing record with the provided details.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `service_category_id` | string | Yes | Service category id |
  | `ride_id` | string | Yes | Ride id |
  | `ride_status` | string | Yes | Ride status |
  | `way_point_status` | string | Yes | Way point status |
  | `hail_ride_status` | string | Yes | Hail ride status |
  | `reason` | string | Yes | Reason |
  | `otp` | string | Yes | Otp |
  | `destination_address` | string | Yes | Destination address |
  | `destination_lat` | string | Yes | Destination lat |
  | `destination_long` | string | Yes | Destination long |
  | `estimated_time` | string | Yes | Estimated time |
  | `total_distance` | string | Yes | Total distance |
  | `toll_charge` | string | Yes | Toll charge |
  | `route_lat_long_list` | string | Yes | Route lat long list |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "service_category_id": 5,
      "ride_id": "64b87d99-3b97-4b17-b4d0-3c7c4d60efb8",
      "otp": 841300,
      "ride_status": 3,
      "way_point_status": 0,
      "ride_completed_status": 0,
      "ride_cancelled_status": 0,
      "driver_current_status": 0,
      "cancel_by": ""
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The service category id field is required."
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

