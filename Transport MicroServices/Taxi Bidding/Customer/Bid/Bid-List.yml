docs: |+
  ## Bid-List

  Returns a paginated list of records matching the request criteria.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `ride_id` | string | Yes | For Ride Id |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "driver_details": [],
      "address_list": [
          {
              "address": "8Q89+83F, 150 Feet Ring Rd, Shastri Nagar, Dharam Nagar,Rajkot,Gujarat",
              "address_lat": "22.3158003",
              "address_long": "70.7650816"
          },
          {
              "address": "7QPF+F2 Rajkot,Gujarat",
              "address_lat": "22.2862485",
              "address_long": "70.7699514"
          }
      ],
      "user_timeout": 20,
      "driver_algo": 0,
      "bid_limit": 1,
      "can_bid_more": 0,
      "remain_bid": 0,
      "min_fare_amount": 500,
      "user_bid_price": 600
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The ride id field is required."
  }
  ```

