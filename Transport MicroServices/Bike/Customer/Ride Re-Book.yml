docs: |+
  ## Ride Re-Book

  Performs the requested operation and returns the result.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `ride_id` | string | Yes | For Ride Id |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "address_list": [
          {
              "address": "8Q89+83F, 150 Feet Ring Rd, Shastri Nagar, Dharam Nagar,Rajkot,Gujarat",
              "address_lat": 22.3158003,
              "address_long": 70.7650816
          },
          {
              "address": "7QPF+F2 Rajkot,Gujarat",
              "address_lat": 22.2862485,
              "address_long": 70.7699514
          }
      ],
      "service_category_id": 1,
      "handicap": 0,
      "child_seat": 0,
      "gender": 0,
      "other_contact_number": "",
      "other_user_name": ""
  }
  ```

  **401 Unauthorized — App Access Denied**

