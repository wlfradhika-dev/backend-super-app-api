docs: |+
  ## Get Nearest Driver Position

  Returns the detailed information of the specified record.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `service_category_id` | string | Yes | For Service Category Id |
  | `current_lat` | string | Yes | For Current Lat |
  | `current_long` | string | Yes | For Current Long |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "active_driver_lat_long": [
          {
              "driver_id": "897dae71-2b64-4451-9fbe-1ff3ac72910d",
              "current_lat": "22.315855",
              "current_long": "70.765244",
              "service_cat_id": 1,
              "name": "Cruiser",
              "distance": 0.017778012890390275,
              "avatar_url": null
          },
          {
              "driver_id": "2c90965d-11d4-4f6e-bf64-47177ea2233c",
              "current_lat": "22.315774",
              "current_long": "70.764894",
              "service_cat_id": 1,
              "name": "Street",
              "distance": 0.019517921510504424,
              "avatar_url": null
          }
      ]
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The service category id field is required."
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

