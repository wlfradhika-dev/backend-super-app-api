docs: |+
  ## Ride Feedback

  Performs the requested operation and returns the result.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "current_page": 1,
      "last_page": 1,
      "total": 1,
      "feedback_list": [
          {
              "rating_id": "650da8bc-bec0-4315-94e3-70554137e636",
              "service_cat_id": 1,
              "ride_id": "0ecc3bb0-6855-4318-aa7c-f381395051f2",
              "user_name": "Rahul",
              "user_profile_image": "",
              "rating": 4.5,
              "comment": "test comments",
              "service_category_name": "Bike Ride",
              "datetime": "2026-02-12 04:37:28",
              "dt": "2026-02-12 04:37:28"
          }
      ]
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

