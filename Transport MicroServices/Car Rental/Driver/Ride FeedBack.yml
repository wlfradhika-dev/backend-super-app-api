docs: |+
  ## Ride FeedBack

  Performs the requested operation and returns the result.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (JSON)

  ```json
  {
      "service_category_id": 8,
      "ride_id": "b28b3ccf-5a42-4c41-98eb-af75700d69c9"
    }
  ```

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "current_page": 1,
      "last_page": 1,
      "total": 1,
      "feedback_list": [
          {
              "rating_id": "807ee325-73e2-4214-85ad-cce4a15b4cdf",
              "service_cat_id": 8,
              "ride_id": "b28b3ccf-5a42-4c41-98eb-af75700d69c9",
              "user_name": "Charlie",
              "user_profile_image": "",
              "rating": 4.5,
              "comment": "Good ride",
              "service_category_name": "",
              "datetime": "2026-03-10 11:04:05",
              "dt": "2026-03-10 11:04:05"
          }
      ]
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

