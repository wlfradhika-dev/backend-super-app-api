docs: |+
  ## Ride Preview

  Performs the requested operation and returns the result.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (JSON)

  ```json
  {
        "service_category_id": 8,                                                                            
        "vehicle_type_id": "f182bc9d-7b4c-4def-aeb7-995f9ae94d1f",
        "start_date_time": "2026-03-10 10:00:00",
        "end_date_time": "2026-03-10 12:00:00",
        "total_km": 6.5,
        "promo_code": "BIKERIDE50"
      }
  ```

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "status_code": 1,
      "https_status_code": 200,
      "data": {
          "travel_hour": "2 hours",
          "free_travel_km": 20,
          "amount_per_hour": 300,
          "subtotal": 600,
          "refer_discount": 0,
          "ride_fare": 600,
          "additional_fare": 0,
          "discount_cost": 0,
          "promocode_discount": 0,
          "promocode_name": "",
          "tax_cost": 60,
          "total_pay": 660,
          "redeem_loyalty_points": 0,
          "loyalty_discount_amount": 0,
          "document_uploaded": 1,
          "document_message": ""
      }
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

