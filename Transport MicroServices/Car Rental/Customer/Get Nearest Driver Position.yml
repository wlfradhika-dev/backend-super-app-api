docs: |+
  ## Get Nearest Driver Position

  Returns the detailed information of the specified record.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (JSON)

  ```json
  {     
      "service_category_id":8,                                                               
      "current_lat": 22.319033,
      "current_long": 70.767158                                                                
  }
  ```

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "active_driver_lat_long": [
          {
              "driver_id": "d19065f6-648c-44cb-86d4-e8f1bd3830fa",
              "current_lat": "22.3215",
              "current_long": "70.769",
              "service_id": 2,
              "name": "Neha Sharma",
              "distance": "0.3333932220093775",
              "avatar_url": null
          },
          {
              "driver_id": "ceaf2ad0-9080-4b80-b9ec-0a6527724405",
              "current_lat": "22.3222",
              "current_long": "70.7702",
              "service_id": 2,
              "name": "Rohit Verma",
              "distance": "0.471089917331045",
              "avatar_url": null
          }
      ]
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

