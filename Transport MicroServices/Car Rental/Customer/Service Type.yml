docs: |+
  ## Service Type

  Performs the requested operation and returns the result.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (JSON)

  ```json
  {
      "address_list": [
        {
          "address_lat": 22.319033,
          "address_long": 70.767158,
          "time": "2026-03-10 10:00:00"
        },
        {
          "address_lat": 22.329500,
          "address_long": 70.780000,
          "time": "2026-03-10 12:00:00"
        }
      ],
      "current_lat": 22.319033,
      "current_long": 70.767158,
      "total_km": 6.5,
      "is_loyalty_discount": 0
    }
  ```

