info:
  name: Service Type
  type: http
  seq: 1

http:
  method: POST
  url: "{{transport_url}}/api/customer/transport/courier/service-type"
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
    - name: select-time-zone
      value: Asia/Kolkata
    - name: session-id
      value: test-session-123
  body:
    type: json
    data: |-
      {
          "service_category_id": 4,
          "current_lat": "23.0225",
          "current_long": "72.5714",
          "address_list": [
            {
              "address": "Destination Address",
              "address_lat": "23.0300",
              "address_long": "72.5800"
            }
          ],
          "is_loyalty_discount": 0
        }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

