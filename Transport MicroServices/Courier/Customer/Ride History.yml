docs: |+
  ## Ride History

  Returns the historical records for the authenticated user.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (JSON)

  ```json
  {
    "service_category_id": 4,
    "timezone": "Asia/Kolkata",
    "filter_type": 0,
    "ride_status": "0,9"
  }
  ```

  ---

