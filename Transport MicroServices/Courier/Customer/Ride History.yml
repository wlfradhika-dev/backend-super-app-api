http:
  method: POST
  url: "{{transport_url}}/api/customer/transport/courier/ride-history"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "service_category_id": 4,
        "timezone": "Asia/Kolkata",
        "filter_type": 0,
        "ride_status": "0,9"
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

