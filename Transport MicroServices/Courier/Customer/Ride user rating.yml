info:
  name: Ride user rating
  type: http
  seq: 9

http:
  method: POST
  url: "{{transport_url}}/api/customer/transport/courier/ride-user-rating"
  body:
    type: json
    data: |-
      {
          "ride_id": "{{RIDE_ID}}",
          "driver_id": "{{DRIVER_ID}}",
          "rating": 5,
          "comment": "Excellent courier service, very careful with package"
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
