docs: |+
  ## Ride history

  Returns the historical records for the authenticated user.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (JSON)

  ```json
  {
    "service_category_id": 4,
    "timezone": "Asia/Kolkata",
     "filter_type": 0,
  "order_status": "1",
  "page": 2,
    "per_page": 5
  }
  ```

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "current_page": 1,
      "last_page": 1,
      "total": 1,
      "total_revenues": 0,
      "completed_ride": 0,
      "total_ride": 1,
      "cancelled_ride": 0,
      "ride_history": [
          {
              "ride_id": "86672011-92f8-47f8-a62a-9fc772c46b43",
              "driver_pay_settle_status": false,
              "service_category_id": 4,
              "service_category_name": "Courier Service",
              "service_category_icon": "http://localhost:8002/storage/img/service-category/05111220242712.png",
              "vehicle_type_name": "SUV",
              "ride_status": 2,
              "ride_date_time": "2026-03-10 10:56:58",
              "ride_amount": "4455.00",
              "ride_flow_type": 1,
              "ride_type": 0,
              "ride_date": "10 Mar, 2026",
              "ride_time": "10:56",
              "service_date_time": "2026-03-10 10:56:58",
              "schedule_service_date_time": "2026-03-10 10:56:58",
              "total_distance": "10.5",
              "rating": 0,
              "ride_no": "40089473"
          }
      ]
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

