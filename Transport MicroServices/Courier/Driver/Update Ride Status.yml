docs: |+
  ## Update Ride Status

  Updates an existing record with the provided details.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (JSON)

  ```json
  {
    "service_category_id": 4,
    "ride_id": "{{RIDE_ID}}",
    "ride_status": 8,
    "rating" : 4.5,
    "comment" : "quick service"
  }
  ```

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "service_category_id": 4,
      "ride_id": "0629d870-1041-446a-a1f2-85d6a3ffd598",
      "otp": 21345,
      "ride_status": 3,
      "ride_completed_status": 0,
      "ride_cancelled_status": 0,
      "driver_current_status": 0,
      "cancel_by": ""
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

