docs: |+
  ## Receiver Resend Otp

  Resends the OTP verification code to the user's registered contact number.

  ### Request Body (JSON)

  ```json
  {
    "service_category_id": 4,
    "ride_id": "{{RIDE_ID}}"
  }
  ```

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "receiver_otp": "909820"
  }
  ```

  **403 Forbidden — Account Blocked**

  ```json
  {
      "success": false,
      "message": "Your account is blocked and not authorized to use application!",
      "message_code": 3,
      "status_code": 3,
      "https_status_code": 403,
      "errors": "Failed"
  }
  ```

