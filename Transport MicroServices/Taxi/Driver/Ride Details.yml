docs: |+
  ## Ride Details

  Returns the detailed information of the specified record.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `service_category_id` | string | Yes | service category id  |
  | `ride_id` | string | Yes | Enter ride booking id |

  ---

  ### Responses

  **200 OK — Success**

