docs: |+
  ## Ride History

  Returns the historical records for the authenticated user.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `service_category_id` | string | Yes | service category id  |
  | `filter_type` | string | Yes | 1:Today, 2: 7 Days, 3: 15 Days, 4: This Month, 5: This year, 6: Last Year, 7: Upcomming Order |
  | `timezone` | string | Yes | For Timezone |
  | `service_category` | string | No | For screen type is optional field |
  | `order_status` | string | Yes | For screen type 1 then ride no required |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "current_page": 1,
      "last_page": 1,
      "total": 1,
      "total_revenues": 0,
      "completed_ride": 0,
      "total_ride": 1,
      "cancelled_ride": 0,
      "ride_history": [
          {
              "ride_id": "e96b9c62-3c53-41c7-bdcf-a8d0cd99a370",
              "driver_pay_settle_status": 0,
              "service_category_id": 2,
              "service_category_name": "Taxi Ride",
              "service_category_icon": "http://127.0.0.1:8001/storage/img/service-category/11350720242806.png",
              "vehicle_type_name": "Sedan",
              "vehicle_type_icon_name": null,
              "ride_status": 1,
              "ride_date_time": "2026-02-09 13:36:15",
              "ride_amount": "500.00",
              "ride_flow_type": 1,
              "ride_type": 0,
              "ride_date": "09 Feb, 2026",
              "ride_time": "13:36",
              "service_date_time": "2026-02-09 13:36:15",
              "schedule_service_date_time": "2026-02-09 13:36:15",
              "total_distance": "10",
              "rating": 0,
              "ride_no": "93475493"
          }
      ]
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The service category id field is required."
  }
  ```

