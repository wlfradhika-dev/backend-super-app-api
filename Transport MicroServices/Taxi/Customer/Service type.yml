docs: |+
  ## Service type

  Performs the requested operation and returns the result.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `service_category_id` | string | Yes | For Service Category Id |
  | `current_lat` | string | Yes | For Current Lat |
  | `current_long` | string | Yes | For Current Long |
  | `address_list` | string | Yes | For Address List |
  | `promo_code` | string | No | Optional |
  | `selected_vehicle_id` | string | Yes | For Vehicle Id not required |
  | `handicap` | string | No | optional 0 = no ,1 = yes |
  | `child_seat` | string | No | optional 0 = no ,1 = yes |
  | `gender` | string | Yes | 0=both, 1=male, 2=female |
  | `pickup_date_time` | string | Yes | For Pickup Date Time |
  | `is_loyalty_discount` | string | Yes | 0 = no |

  ---

  ### Responses

