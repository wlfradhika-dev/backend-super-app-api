docs: |+
  ## Add Favourite Driver

  Creates a new record with the provided details.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `service_category_id` | string | Yes | For Service Category Id |
  | `driver_id` | string | Yes | For Driver Id |
  | `is_favourite` | string | Yes | 1=on, 0=off |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Favourite driver add success",
      "message_code": 16,
      "status_code": 1,
      "http_status_code": 200,
      "is_favourite": 1
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The service category id field is required."
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

