docs: |+
  ## Favourite Driver List

  Returns a paginated list of records matching the request criteria.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "favourite_driver_list": [
          {
              "driver_id": "9aac2ad1-5fef-4a36-b3af-b02a72fcf43b",
              "service_cat_id": 2,
              "rating": 4.5,
              "driver_name": "Vishal",
              "category_name": "Taxi Ride",
              "driver_image": "",
              "avatar_url": null
          }
      ]
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

