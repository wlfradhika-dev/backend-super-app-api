docs: |+
  ## Ride Booking

  Performs the requested operation and returns the result.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `service_category_id` | string | Yes | For Service Category Id |
  | `payment_type` | string | Yes | 1=cash , 2=card, 3=wallet |
  | `estimated_time` | string | Yes | For Estimate Time |
  | `total_distance` | string | Yes | For Total Distance |
  | `vehicle_type_id` | string | Yes | service_type_id is replace to transport vehicle type id |
  | `gender` | string | Yes | 0=both, 1=male, 2=female |
  | `pickup_date_time` | string | Yes | For Pickup Date Time |
  | `promo_code` | string | No | Optional |
  | `city_name` | string | No | Optional |
  | `address_list` | string | Yes | For Address List |
  | `additional_remarks` | string | No | Optional |
  | `handicap` | string | No | Optional |
  | `child_seat` | string | No | Optional |
  | `bidding_offer` | string | Yes | require if service_category_id == 5 |
  | `ride_id` | string | Yes | Ride id |
  | `redeem_loyalty_points` | string | Yes | Redeem loyalty points |
  | `loyalty_discount_amount` | string | Yes | Loyalty discount amount |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "ride_id": "d8e8dfce-8e4e-48e9-b5f0-739091587e21",
      "booking_no": "55517230",
      "pickup_date_time": "13 Feb, 2026",
      "pickup_address": "8Q89+83F, 150 Feet Ring Rd, Shastri Nagar, Dharam Nagar,Rajkot,Gujarat",
      "destination_address": "7QPF+F2 Rajkot,Gujarat",
      "ride_status": 0,
      "accept_time_out": 20
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The service category id field is required."
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

