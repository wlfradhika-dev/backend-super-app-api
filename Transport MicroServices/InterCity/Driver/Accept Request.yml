docs: |+
  ## Accept Request

  Performs the requested operation and returns the result.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `service_category_id` | string | Yes | service category id  |
  | `request_id` | string | Yes | Enter ride booking id |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "driver_current_status": 0,
      "ride_details": {
          "ride_id": "0ecc3bb0-6855-4318-aa7c-f381395051f2",
          "sub_ride_id": 0,
          "user_id": "464d3a33-f393-489b-9dd2-cccedaa60070",
          "user_fcm_token": "123456",
          "booking_no": "63723216",
          "service_category_id": 1,
          "user_profile_image": null,
          "user_name": "Rahul ",
          "contact_number": "123",
          "address_list": [
              {
                  "address": "8Q89+83F, 150 Feet Ring Rd, Shastri Nagar, Dharam Nagar,Rajkot,Gujarat",
                  "address_lat": "22.3158003",
                  "address_long": "70.7650816"
              },
              {
                  "address": "7QPF+F2 Rajkot,Gujarat",
                  "address_lat": "22.2862485",
                  "address_long": "70.7699514"
              }
          ],
          "flat_no": "",
          "landmark": "",
          "pickup_datetime": "2026-02-11T13:49:02.000000Z",
          "total_amount": 183,
          "payment_type": 1,
          "ride_status": 1,
          "way_point_status": 0
      },
      "noti_log": {
          "title": "New Notification",
          "title_code": "16",
          "sound": "true",
          "notification_type": "1",
          "ride_id": "0ecc3bb0-6855-4318-aa7c-f381395051f2",
          "sub_ride_id": "0",
          "ride_status": "1",
          "message": "Driver Accepted Ride",
          "message_code": "20",
          "service_category_id": "1",
          "booking_type": "0"
      }
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The service category id field is required."
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

