docs: |+
  ## Ride Feedback

  Performs the requested operation and returns the result.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "current_page": 1,
      "last_page": 1,
      "total": 1,
      "feedback_list": [
          {
              "rating_id": "d03c0e73-97ea-4da8-adb4-f62a46f41924",
              "service_cat_id": 3,
              "ride_id": "d8e8dfce-8e4e-48e9-b5f0-739091587e21",
              "user_name": "Rahul",
              "user_profile_image": "",
              "rating": 4.5,
              "comment": "test comments",
              "service_category_name": "Intercity",
              "datetime": "2026-02-13 13:30:45",
              "dt": "2026-02-13 13:30:45"
          }
      ]
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

