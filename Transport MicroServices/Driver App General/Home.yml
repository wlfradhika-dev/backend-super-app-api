docs: |+
  ## Home

  Returns the homepage data including available services, banners, and promotional content.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `service_category_id` | string | Yes | Service category id |
  | `current_lat` | string | Yes | Current lat |
  | `current_long` | string | Yes | Current long |
  | `app_version` | string | Yes | App version |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "service_category_id": 1,
      "driver_id": "5248abed-e65e-4bc3-8e06-18149da89f81",
      "driver_name": "Cruiser",
      "driver_profile": "",
      "is_valid_amount": "You need atleast $50 to receive rides",
      "driver_current_status": 0,
      "driver_service": "",
      "vehicle_type_icon": "",
      "vehicle_type_name": "",
      "today_order": 0,
      "today_earning": 0,
      "cash_payment": 1,
      "card_payment": 1,
      "wallet_payment": 1,
      "is_subscription": 1,
      "cash_out_status": 1,
      "expired_document_message": "",
      "is_document_expired": 0,
      "is_transport_pause_start_module_enable": 1,
      "is_private_driver": 0
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The service category id field is required."
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

