docs: |+
  ## Vehicle Update

  Updates an existing record with the provided details.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `service_category_id` | string | Yes | Service category id |
  | `vehicle_type_id` | string | Yes | Vehicle type id |
  | `manufacture_name` | string | Yes | Manufacture name |
  | `model_name` | string | Yes | Model name |
  | `model_year` | string | Yes | Model year |
  | `vehicle_plat_no` | string | Yes | Vehicle plat no |
  | `vehicle_color` | string | No | optional |
  | `is_rental` | string | No | optional |
  | `no_of_seat` | string | No | optional |
  | `handicap_accessibility` | string | No | optional |
  | `child_seat_accessibility` | string | No | optional |
  | `support_weight` | string | No | optional |
  | `vehicle_image` | string | No | optional |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "vehicle_type_id": "2239b831-c26e-4fbd-8514-20196c7574ed",
      "manufacture_name": "Honda",
      "model_name": "City",
      "model_year": 2024,
      "vehicle_plat_no": "GJ01AB1234",
      "no_of_seat": 1,
      "is_rental": true,
      "vehicle_color": "White",
      "handicap_accessibility": false,
      "child_seat_accessibility": false,
      "support_weight": null,
      "vehicle_type_name": "Street",
      "vehicle_type_icon": "http://127.0.0.1:8001/storage/img/service-category/transport-service-type/110340520242707.png",
      "vehicle_image": "http://127.0.0.1:8001/storage/img/driver-vehicle-image/m7wGNXq1l5gkAW4P.jpg",
      "driver_service": "Ride service, Courier Delivery, Store Delivery, Rental service",
      "is_ride_service": true
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The service category id field is required."
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

