docs: |+
  ## Transport Driver Vehicle Services

  Performs the requested operation and returns the result.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `is_new_driver` | string | Yes | 1 for new driver |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "get_active_service_category": [
          {
              "service_cat_id": 2,
              "service_cat_name": "Taxi Ride",
              "service_name": "CAR",
              "is_active": 0,
              "service_category_icon": "http://127.0.0.1:8001/storage/img/service-category/11350720242806.png"
          },
          {
              "service_cat_id": 1,
              "service_cat_name": "Bike Ride",
              "service_name": "BIKE",
              "is_active": 1,
              "service_category_icon": "http://127.0.0.1:8001/storage/img/service-category/11345620242806.png"
          }
      ],
      "get_active_taxi_service": [
          {
              "service_cat_id": 5,
              "service_cat_name": "Taxi Bidding",
              "icon_image": null
          },
          {
              "service_cat_id": 6,
              "service_cat_name": "Taxi Pool",
              "icon_image": null
          },
          {
              "service_cat_id": 7,
              "service_cat_name": "Car Rental",
              "icon_image": null
          },
          {
              "service_cat_id": 2,
              "service_cat_name": "Taxi Ride",
              "icon_image": null
          },
          {
              "service_cat_id": 3,
              "service_cat_name": "Intercity",
              "icon_image": null
          }
      ]
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The is new driver field is required."
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

