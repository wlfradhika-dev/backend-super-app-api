docs: |+
  ## Driver Earning Analytc

  Performs the requested operation and returns the result.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `filter_type` | string | Yes | 1 Today, 2 Last 7 Days, 3 Last 15 Days, 4 This Month, 5 This Year, 6 Last Year, 7 Upcoming Orders, 8 All Orders |
  | `service_category_id` | string | Yes | Service category id |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "status": 1,
      "message": "Success",
      "message_code": 1,
      "total_all_order": 0,
      "total_all_order_earn": 0,
      "earning_list": []
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The filter type field is required."
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

