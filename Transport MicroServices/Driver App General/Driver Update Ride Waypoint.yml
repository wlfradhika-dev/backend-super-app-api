info:
  name: Driver Update Ride Waypoint
  type: http
  seq: 12

http:
  method: POST
  url: "{{transport_url}}/api/driver/driver-update-ride-waypoint"
  headers:
    - name: Accept
      value: application/json
  body:
    type: multipart-form
    data:
      - name: ride_id
        type: text
        value: 0a3bbb76-2bc3-412d-b02d-c27e92912d5d
      - name: way_point_time
        type: text
        value: "8"
      - name: way_point_distance
        type: text
        value: "2.4"
  auth:
    type: bearer
    token: "{{driver_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |+
  ## Driver Update Ride Waypoint

  Updates an existing record with the provided details.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `ride_id` | string | Yes | Ride id |
  | `way_point_time` | string | Yes | Way point time |
  | `way_point_distance` | string | Yes | Way point distance |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The ride id field is required."
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

