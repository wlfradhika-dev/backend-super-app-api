docs: |+
  ## Hail Ride Booking

  Performs the requested operation and returns the result.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `service_category_id` | string | Yes | Service category id |
  | `estimated_time` | string | Yes | Estimated time |
  | `total_distance` | string | Yes | Total distance |
  | `service_type_id` | string | Yes | Service type id |
  | `user_name` | string | No | optional |
  | `user_contact_number` | string | No | optional |
  | `address_list` | string | Yes | Address list |
  | `booking_status` | string | Yes | Booking status |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "status": 1,
      "message": "driver_messages.1",
      "message_code": 1,
      "ride_id": "0a3bbb76-2bc3-412d-b02d-c27e92912d5d",
      "booking_no": 26968218,
      "pickup_date_time": "26 Feb, 2026",
      "pickup_address": "Pickup Address",
      "destination_address": "Drop Address",
      "ride_status": 5,
      "hail_ride_status": 1
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The service category id field is required."
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

