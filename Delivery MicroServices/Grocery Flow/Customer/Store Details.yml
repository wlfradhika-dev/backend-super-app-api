docs: |+
  ## Store Details

  Creates a new record with the provided details.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `store_id` | string | Yes | Store id |
  | `lat` | string | Yes | Lat |
  | `long` | string | Yes | Long |
  | `filter_key` | string | Yes | Filter key |
  | `product_search` | string | Yes | Product search |

  ---

