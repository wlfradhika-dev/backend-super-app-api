docs: |+
  ## Order History

  Creates a new record with the provided details.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `filter_type` | string | Yes | Filter type |
  | `order_status` | string | Yes | Order status |
  | `per_page` | string | Yes | Per page |
  | `page` | string | Yes | Page |
  | `timezone` | string | Yes | Timezone |
  | `store_id` | string | Yes | Store id |

  ---

  ### Responses

