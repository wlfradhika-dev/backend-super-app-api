docs: |+
  ## Product Lists

  Returns a paginated list of records matching the request criteria.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `store_id` | string | Yes | Store id |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "product_list": [
          {
              "category_id": "abc44f28-c090-4ef8-a8fd-f26288f18d11",
              "category_name": "Banana Wafers",
              "products": [
                  {
                      "product_id": "f3e1944d-5f7a-474e-b53c-ad87cf7cd001",
                      "product_name": "Banana Wafers",
                      "product_status": 1
                  }
              ]
          },
          {
              "category_id": "f3c44f28-c090-4ef8-a8fd-f26288f18d11",
              "category_name": "Fast Food",
              "products": [
                  {
                      "product_id": "f3e1944d-5f7a-474e-b53c-adb7cf7cd001",
                      "product_name": "Cheese Burger",
                      "product_status": 1
                  },
                  {
                      "product_id": "f3e1945d-9f7a-474e-b53c-adb7cf7cd002",
                      "product_name": "Veg Sandwich",
                      "product_status": 1
                  }
              ]
          }
      ]
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The store id field is required."
  }
  ```

