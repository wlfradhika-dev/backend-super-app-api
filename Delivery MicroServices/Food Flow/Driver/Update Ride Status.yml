docs: |+
  ## Update Ride Status

  Updates an existing record with the provided details.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `ride_id` | string | Yes | Ride id |
  | `ride_status` | string | Yes | Ride status |
  | `total_amount` | string | Yes | Total amount |
  | `otp` | string | Yes | Otp |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "service_category_id": 8,
      "ride_id": "6c249613-6393-4628-aae8-2da34c86ea91",
      "ride_status": 9,
      "way_point_status": 0,
      "ride_completed_status": 0,
      "ride_cancelled_status": 0,
      "driver_current_status": 1,
      "cancel_by": ""
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The ride id field is required."
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

