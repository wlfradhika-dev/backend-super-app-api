docs: |+
  ## Order History

  Returns the historical records for the authenticated user.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `filter_type` | string | Yes | Filter type |
  | `timezone` | string | Yes | Timezone |
  | `service_category` | string | Yes | Service category |
  | `order_status` | string | Yes | Order status |
  | `per_page` | string | Yes | Per page |
  | `page` | string | Yes | Page |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "current_page": 1,
      "last_page": 1.1,
      "total": 1,
      "order_list": [
          {
              "order_id": "6cc904e3-067d-4250-9e4e-e4a4fa7a237e",
              "order_no": "78481043",
              "category_id": 8,
              "category_name": "Food Delivery",
              "category_icon": "http://localhost/storage/img/service-category/food-delivery.png",
              "store_name": "Store Testing",
              "service_date": "Thu 19 Feb ,2026",
              "service_time": "09:28",
              "service_date_time": "2026-02-19 09:28:10",
              "schedule_order_date_time": "2026-02-19 09:28:10",
              "delivery_address": "Shital park",
              "total_pay": 34.8,
              "order_status": 1,
              "user_taken_type": 1,
              "user_rating": 0
          }
      ]
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The filter type field is required."
  }
  ```

