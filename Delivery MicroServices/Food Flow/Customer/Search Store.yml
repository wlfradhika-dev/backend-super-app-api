docs: |+
  ## Search Store

  Returns search results for the given query across available records.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `lat` | string | Yes | Lat |
  | `long` | string | Yes | Long |
  | `service_category_id` | string | Yes | Service category id |
  | `search` | string | Yes | Search |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "status": 0,
      "message": "The search field is required when category id is not present."
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The lat field is required."
  }
  ```

