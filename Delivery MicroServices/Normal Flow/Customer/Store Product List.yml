docs: |+
  ## Store Product List

  Returns a paginated list of records matching the request criteria.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `store_id` | string | Yes | Store id |
  | `category_id` | string | Yes | Category id |
  | `page` | string | Yes | Page |
  | `per_page` | string | Yes | Per page |
  | `search` | string | Yes | Search |
  | `filter_type` | string | Yes | Filter type |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "store_id": "a2aff62e-3bf9-4f12-9f0f-fb553d5b5d01",
      "category_id": "a2af4f28-c090-4ef8-a8fd-f26288f18d11",
      "current_page": 1,
      "last_page": 1,
      "total": 2,
      "product_list": [
          {
              "product_id": "a2af944d-5f7a-474e-b53c-adb7cf7cd001",
              "product_original_image": "http://localhost/storage/img/store-images/english-rose.jpg",
              "product_image": "http://localhost/storage/img/store-images/english-rose.jpg",
              "product_name": "English Roses",
              "food_type": 1,
              "product_amount": 12,
              "discount_amount": 0,
              "offer_discount": 0,
              "description": "english-rose",
              "customize_list": []
          },
          {
              "product_id": "a2af944d-5f7a-474e-b53c-adb7cf7cd002",
              "product_original_image": "http://localhost/storage/img/store-images/climbing-rose.jpg",
              "product_image": "http://localhost/storage/img/store-images/climbing-rose.jpg",
              "product_name": "Climbing Roses",
              "food_type": 1,
              "product_amount": 8,
              "discount_amount": 0,
              "offer_discount": 0,
              "description": "climbing-rose",
              "customize_list": []
          }
      ]
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The store id field is required."
  }
  ```

