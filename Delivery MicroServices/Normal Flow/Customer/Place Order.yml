docs: |+
  ## Place Order

  Performs the requested operation and returns the result.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `store_id` | string | Yes | Store id |
  | `address` | string | Yes | Address |
  | `payment_type` | string | Yes | Payment type |
  | `user_taken_type` | string | Yes | User taken type |
  | `tip` | string | Yes | Tip |
  | `additional_info` | string | Yes | Additional info |
  | `promo_code` | string | Yes | Promo code |
  | `redeem_loyalty_points` | string | Yes | Redeem loyalty points |
  | `loyalty_discount_amount` | string | Yes | Loyalty discount amount |
  | `schedule_date_time` | string | Yes | Schedule date time |
  | `product_list` | string | Yes | Product list |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "order_id": "7efce026-8352-41ad-96aa-864ffd1e2aff",
      "order_no": "54607256",
      "redirect_url": "",
      "success_url": "",
      "failed_url": "",
      "unavailable_products": ""
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The store id field is required."
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

