docs: |+
  ## Home

  Returns the homepage data including available services, banners, and promotional content.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `app_version` | string | Yes | App version |
  | `current_lat` | string | Yes | Current lat |
  | `current_long` | string | Yes | Current long |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "service_category_id": 2,
      "driver_id": "74104b9d-235e-4d38-bf1a-8af00e2fd705",
      "driver_service_id": "acf024ec-599c-4700-8d9d-5861d908042d",
      "driver_name": "Driver Nine",
      "driver_profile": "",
      "is_valid_amount": "",
      "driver_current_status": 1,
      "driver_service": "",
      "vehicle_type_icon": "",
      "vehicle_type_name": "",
      "today_order": 2,
      "today_earning": 20,
      "cash_payment": true,
      "card_payment": true,
      "wallet_payment": true,
      "is_subscription": 1,
      "cash_out_status": 1,
      "expired_document_message": "",
      "is_document_expired": 0,
      "is_private_driver": 0
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The app version field is required."
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

