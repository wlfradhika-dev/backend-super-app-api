docs: |+
  ## Get Vehicle Details

  Returns the detailed information of the specified record.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "driver_vehicle_id": "2fac4a2e-fe39-4c6f-bed6-92cc56f0036e",
      "vehicle_type_id": "57606fa1-2a01-4189-b333-7af71140b791",
      "manufacture_name": "hundai",
      "model_name": "verna",
      "model_year": 2013,
      "vehicle_plat_no": "2618",
      "no_of_seat": 1,
      "is_driver_service": 0,
      "vehicle_color": "black",
      "handicap_accessibility": null,
      "child_seat_accessibility": null,
      "vehicle_type_list": []
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

