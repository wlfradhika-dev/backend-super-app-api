docs: |+
  ## Accept Request

  Performs the requested operation and returns the result.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `service_category_id` | string | Yes | Service category id |
  | `request_id` | string | Yes | Request id |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "driver_current_status": 1,
      "ride_details": {
          "ride_id": "1fac30fc-377f-4906-ba4b-837c3f74c928",
          "booking_no": "49660662",
          "service_category_id": 8,
          "user_profile_image": "",
          "user_name": "Wlf Karan",
          "contact_number": "999",
          "address_list": [
              {
                  "address": "The Spire 2, BRTS, 150 Feet Ring Rd, nr. Shital Park, Shastri Nagar, Dharam Nagar, Rajkot",
                  "address_lat": "22.31572603394304",
                  "address_long": "70.7674083384962"
              },
              {
                  "address": "The Spire 2, BRTS, 150 Feet Ring Rd, nr. Shital Park, Shastri Nagar, Dharam Nagar, Rajkot",
                  "address_lat": "22.31572603394304",
                  "address_long": "70.7674083384962"
              }
          ],
          "flat_no": "2b",
          "landmark": "rajkot",
          "pickup_datetime": "2026-02-26T05:20:16.000000Z",
          "total_amount": 34.8,
          "payment_type": 1,
          "ride_status": 1,
          "way_point_status": 0
      }
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The service category id field is required."
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

