docs: |+
  ## Search Product

  Returns search results for the given query across available records.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `lat` | string | Yes | Lat |
  | `long` | string | Yes | Long |
  | `service_category_id` | string | Yes | Service category id |
  | `search` | string | Yes | Search |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "current_page": 1,
      "last_page": 1,
      "total": 1,
      "product_list": [
          {
              "product_id": "f3e1944d-5f7a-474e-b53c-adb7cf7cd001",
              "product_image": "http://localhost/storage/img/store-images/burger.jpg",
              "product_name": "Cheese Burger",
              "food_type": 1,
              "product_amount": 12,
              "discount_amount": 0,
              "offer_discount": 0,
              "store_id": "f2a6f62e-3bf9-4f12-9f0f-fb553d5b5d01",
              "store_name": "Store Testing",
              "is_subcat_flow": 0
          }
      ]
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The lat field is required."
  }
  ```

