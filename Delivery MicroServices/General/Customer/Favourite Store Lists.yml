docs: |+
  ## Favourite Store Lists

  Returns a paginated list of records matching the request criteria.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `service_category_id` | string | Yes | Service category id |
  | `view_all` | string | Yes | View all |
  | `page` | string | Yes | Page |
  | `lat` | string | Yes | Lat |
  | `long` | string | Yes | Long |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "service_category_id": "8",
      "service_category_name": "Food Delivery",
      "service_category_icon": "http://127.0.0.1:8004/assets/images/service-category/food-delivery.png?v=0.3",
      "display_title_name": "Favourite ",
      "store_lists": [
          {
              "id": "473ed22c-f15e-41e3-baaf-137bcae428c0",
              "store_id": "f2a6f62e-3bf9-4f12-9f0f-fb553d5b5d01",
              "service_category_id": 8,
              "store_name": "Store Testing",
              "store_products": "Fast Food,Banana Wafers",
              "average_ratings": "4.6",
              "order_delivery_time": 30,
              "store_banner": "",
              "offer": "Get 5%  off on orders above $10",
              "order_min_amount": 20,
              "store_status": 1,
              "offer_type": 2,
              "offer_min_amount": 10,
              "offer_amount": "5",
              "no_of_ratings": 1
          }
      ],
      "view_all_btn": 0,
      "total_page": 1,
      "per_page": 10,
      "current_page": 1
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The service category id field is required."
  }
  ```

