docs: |+
  ## Home Page Feature Store

  Returns the homepage data including available services, banners, and promotional content.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `lat` | string | Yes | Lat |
  | `long` | string | Yes | Long |
  | `service_category_id` | string | Yes | Service category id |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "all_feature_store": [
          {
              "service_category_id": 8,
              "service_category_name": "Food Delivery",
              "service_category_icon": "http://localhost/storage/img/service-category/food-delivery.png",
              "display_title_name": "Feature Food Delivery",
              "store_lists": [
                  {
                      "id": "f2a6f62e-3bf9-4f12-9f0f-fb553d5b6e02",
                      "store_id": "f2a6f62e-3bf9-4f12-9f0f-fb553d5b5d01",
                      "service_category_id": 8,
                      "store_name": "Store Testing",
                      "store_products": "Fast Food",
                      "average_ratings": "4.3",
                      "eta_delivery_time": 30,
                      "store_image": "store-test.jpg",
                      "distance": "0.2394870618187738",
                      "service_radius": 100,
                      "offer": "Get 5%  off on orders above $10",
                      "offer_type": 2,
                      "offer_min_amount": 10,
                      "offer_amount": "5",
                      "no_of_ratings": 2,
                      "store_status": 1
                  }
              ],
              "view_all_btn": 0
          }
      ]
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The lat field is required."
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

