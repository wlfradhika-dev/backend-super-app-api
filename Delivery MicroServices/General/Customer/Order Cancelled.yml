docs: |+
  ## Order Cancelled

  Cancels the specified record or ongoing process.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `order_id` | string | Yes | Order id |
  | `cancel_reason` | string | Yes | Cancel reason |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "store_name": "Store Testing",
      "order_current_status": 4,
      "order_cancel_reject_title": "Order Cancelled By User",
      "cancel_charge": 0,
      "order_status_list": [
          {
              "order_status": 1,
              "update_status_time": "01:34 PM"
          },
          {
              "order_status": 4,
              "update_status_time": "01:35 PM"
          }
      ]
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The order id field is required."
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

