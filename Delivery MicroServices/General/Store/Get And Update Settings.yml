docs: |+
  ## Get And Update Settings

  Creates a new record with the provided details.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `is_update` | string | Yes | Is update |
  | `eta_delivery_time` | string | Yes | Eta delivery time |
  | `service_radius` | string | Yes | Service radius |
  | `order_min_amount` | string | Yes | Order min amount |
  | `packaging_charges` | string | Yes | Packaging charges |
  | `store_timing` | string | Yes | Store timing |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "eta_delivery_time": 30,
      "order_min_amount": 20,
      "packaging_charges": 2,
      "service_radius": 100,
      "store_timings": [
          {
              "day": "SUN",
              "display_day": "SUN",
              "isCheck": true,
              "open_time": "12:00 AM",
              "close_time": "11:59 PM"
          },
          {
              "day": "MON",
              "display_day": "MON",
              "isCheck": true,
              "open_time": "12:00 AM",
              "close_time": "11:59 PM"
          },
          {
              "day": "TUE",
              "display_day": "TUE",
              "isCheck": true,
              "open_time": "12:00 AM",
              "close_time": "11:59 PM"
          },
          {
              "day": "WED",
              "display_day": "WED",
              "isCheck": true,
              "open_time": "12:00 AM",
              "close_time": "11:59 PM"
          },
          {
              "day": "THU",
              "display_day": "THU",
              "isCheck": true,
              "open_time": "12:00 AM",
              "close_time": "11:59 PM"
          },
          {
              "day": "FRI",
              "display_day": "FRI",
              "isCheck": true,
              "open_time": "12:00 AM",
              "close_time": "11:59 PM"
          },
          {
              "day": "SAT",
              "display_day": "SAT",
              "isCheck": true,
              "open_time": "12:00 AM",
              "close_time": "11:59 PM"
          }
      ]
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The is update field is required."
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

