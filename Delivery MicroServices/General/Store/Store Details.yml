              "store_close_time": "23:59:00"
          },
          {
              "day": "Fri",
              "store_open_time": "00:00:00",
              "store_close_time": "23:59:00"
          },
          {
              "day": "Sat",
              "store_open_time": "00:00:00",
              "store_close_time": "23:59:00"
          },
          {
              "day": "all",
              "store_open_time": "00:00:00",
              "store_close_time": "23:59:00"
          }
      ]
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

