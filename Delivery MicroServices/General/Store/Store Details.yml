docs: |+
  ## Store Details

  Creates a new record with the provided details.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "store_name": "Store Testing",
      "store_banner": "http://localhost/storage/img/store-images/store-test.jpg",
      "offer_min_bill_amount": 10,
      "offer_discount": 5,
      "offer_discount_type": 2,
      "store_address": "The Spire 2, BRTS, 150 Feet Ring Rd, nr. Shital Park, Shastri Nagar, Dharam Nagar, Rajkot",
      "store_address_lat": "22.31572603394304",
      "store_address_long": "70.7674083384962",
      "eta_delivery_time": 30,
      "store_packaging_charges": 2,
      "taken_away_type": 2,
      "store_rating": 4.3,
      "store_description": "Seeded store for store-list API testing.",
      "store_timings": [
          {
              "day": "Mon",
              "store_open_time": "00:00:00",
              "store_close_time": "23:59:00"
          },
          {
              "day": "Tue",
              "store_open_time": "00:00:00",
              "store_close_time": "23:59:00"
          },
          {
              "day": "Wed",
              "store_open_time": "00:00:00",
              "store_close_time": "23:59:00"
          },
          {
              "day": "Thu",
