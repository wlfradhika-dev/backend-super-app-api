docs: |+
  ## Home

  Returns the homepage data including available services, banners, and promotional content.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `app_version` | string | Yes | App version |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "cash_payment": 1,
      "card_payment": 1,
      "wallet_payment": 1,
      "pending_orders": [
          {
              "order_id": "6cc904e3-067d-4250-9e4e-e4a4fa7a237e",
              "order_no": "78481043",
              "customer_name": "Rahul",
              "delivery_address": "Shital park",
              "total_amount": "34.80",
              "order_status": 1,
              "order_type": 0,
              "order_product_list": "Cheese Burger x 2",
              "schedule_order_date_time": "2026-02-19 09:28:10",
              "schedule_order_date": "Thu 19 Feb, 2026",
              "schedule_order_time": "09:28 AM",
              "payment_type": 1,
              "user_taken_type": 1
          }
      ],
      "accepted_orders": [],
      "processing_order": [],
      "dispatched_order": [],
      "service_category_name": "Food Delivery",
      "is_subscription": 1,
      "cash_out_status": 1,
      "current_status": 1,
      "store_name": "Store Testing",
      "store_banner": "http://127.0.0.1:8004/assets/images/store-images/store-test.jpg",
      "server_time_zone": "UTC"
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The app version field is required."
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

