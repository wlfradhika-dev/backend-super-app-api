docs: |+
  ## Update Current Status

  Creates a new record with the provided details.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (JSON)

  ```json
  {
      "update_status" : 1
  }
  ```

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": false,
      "message": "Your document approval is pending",
      "message_code": 355,
      "status_code": 0,
      "http_status_code": 200,
      "errors": {
          "is_document_pending": 1
      }
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

