docs: |+
  ## Delivery Order Details

  Returns the detailed information of the specified record.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `ride_id` | string | Yes | Ride id |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "booking_no": "64872013",
      "order_date_time": "Tue 24 Feb, 2026",
      "total_pay": 34.8,
      "payment_type": 1,
      "service_date_time": "2026-02-24 06:17:49",
      "schedule_order_date_time": "2026-02-24T06:17:49.000000Z",
      "store_name": "Store Testing",
      "order_chat_number": "64872013-7a3d05c1-0ab8-444d-aea8-311ce511b422",
      "product_details": [
          {
              "product_name": "Veg Sandwich",
              "num_of_items": 3,
              "product_price_for_one": 8,
              "total_product_amount": 24
          }
      ]
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The ride id field is required."
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

