docs: |+
  ## Store Product List

  Returns a paginated list of records matching the request criteria.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `store_id` | string | Yes | Store id |
  | `category_id` | string | Yes | Category id |
  | `page` | string | Yes | Page |
  | `per_page` | string | Yes | Per page |
  | `search` | string | Yes | Search |
  | `filter_type` | string | Yes | Filter type |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "store_id": "a2b6f62e-3bf9-5f02-9f0f-fb553d5b5d02",
      "category_id": "a2b44f28-c090-5f08-a8fd-f26288f18d13",
      "current_page": 1,
      "last_page": 1,
      "total": 2,
      "product_list": [
          {
              "product_id": "a2b1944d-5f0a-574e-b53c-adb7cf7cd001",
              "product_original_image": "http://localhost/storage/img/store-images/cephalexin.jpg",
              "product_image": "http://localhost/storage/img/store-images/cephalexin.jpg",
              "product_name": "Cephalexin",
              "food_type": 1,
              "product_amount": 12,
              "discount_amount": 0,
              "offer_discount": 0,
              "description": "sub category product.",
              "customize_list": []
          },
          {
              "product_id": "a2b1944d-5f0a-574e-b53c-adb7cf7cd002",
              "product_original_image": "http://localhost/storage/img/store-images/alprazolam.jpg",
              "product_image": "http://localhost/storage/img/store-images/alprazolam.jpg",
              "product_name": "Alprazolam",
              "food_type": 1,
              "product_amount": 8,
              "discount_amount": 0,
              "offer_discount": 0,
              "description": "sub category product.",
              "customize_list": []
          }
      ]
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The store id field is required."
  }
  ```

