info:
  name: Store Product List
  type: http
  seq: 10

http:
  method: POST
  url: "{{delivery_url}}/api/medicine-flow/customer/store-product-list"
  headers:
    - name: Accept
      value: application/vnd.api+json
  body:
    type: multipart-form
    data:
      - name: store_id
        type: text
        value: "{{store_detail_id}}"
        description: delivery_store_detail.id
      - name: category_id
        type: text
        value: a2b44f28-c090-5f08-a8fd-f26288f18d13
        description: delivery_store_product_category.id
      - name: page
        type: text
        value: "1"
        description: page number
      - name: per_page
        type: text
        value: "10"
        description: records per page
      - name: search
        type: text
        value: Cephalexin
      - name: filter_type
        type: text
        value: "0"
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

