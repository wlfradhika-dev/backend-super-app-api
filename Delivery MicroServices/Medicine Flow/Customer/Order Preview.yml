docs: |+
  ## Order Preview

  Performs the requested operation and returns the result.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (JSON)

  ```json
  {
      "store_id": "a2b6f62e-3bf9-5f02-9f0f-fb553d5b5d02",
      "user_taken_type": 1,
      "promo_code": null,
      "address": "0",
      "product_list": "[{\"product_id\":\"f3e1944d-5f7a-474e-b53c-adb7cf7cd002\",\"product_quantity\":[{\"quantity\":3,\"size\":0}]}]",
      "tip": 0,
      "is_loyalty_discount": 0,
      "redeem_loyalty_points": 0,
      "loyalty_discount_amount": 0
  }
  ```

