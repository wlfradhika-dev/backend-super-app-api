info:
  name: Order Preview
  type: http
  seq: 9

http:
  method: POST
  url: "{{delivery_url}}/api/medicine-flow/customer/order-preview"
  headers:
    - name: Accept
      value: application/vnd.api+json
      disabled: true
  body:
    type: multipart-form
    data:
      - name: store_id
        type: text
        value: a2b6f62e-3bf9-5f02-9f0f-fb553d5b5d02
        description: delivery_store_detail:id
      - name: user_taken_type
        type: text
        value: "1"
        description: 1= not taken away type, 2= taken away type
      - name: promo_code
        type: text
        value: "null"
        description: "Promocode Name "
      - name: address
        type: text
        value: "{{address_id}}"
        description: Address id
      - name: product_list
        type: text
        value: '[{"product_id":"{{product_id}}","product_quantity":[{"quantity":3,"size":0}]}]'
        description: product detail
      - name: tip
        type: text
        value: "0"
        description: Tip amount
      - name: is_loyalty_discount
        type: text
        value: "0"
        description: |-
          0 = no loyalty discount,
          1 = check loyalty eligibility only
          2 = calculate and apply loyalty discount
      - name: redeem_loyalty_points
        type: text
        value: "0"
        description: number of loyalty points the customer wants to redeem
        disabled: true
      - name: loyalty_discount_amount
        type: text
        value: "0"
        description: discount amount calculated from the redeemed loyalty points
        disabled: true
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

