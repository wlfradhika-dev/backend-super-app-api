docs: |+
  ## Store Product Category Lists

  Returns a paginated list of records matching the request criteria.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `service_category_id` | string | Yes | For Service Category Id |
  | `store_id` | string | Yes | Store id |
  | `category_id` | string | Yes | Category id |
  | `product_search` | string | Yes | Product Name, category name For Search |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "product_category_list": [
          {
              "product_category_id": "a2b44f28-c090-5f08-a8fd-f26288f18d11",
              "product_category_name": "Tablet",
              "category_icon": "http://localhost/storage/img/store-category-images/table.png"
          },
          {
              "product_category_id": "a2b44f28-c090-5f08-a8fd-f26288f18d12",
              "product_category_name": "Pain Killers",
              "category_icon": "http://localhost/storage/img/store-category-images/pain-killer.png"
          }
      ]
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The service category id field is required."
  }
  ```

