docs: |+
  ## Re Order

  Performs the requested operation and returns the result.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `order_id` | string | Yes | Order id |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "reorder_id": "60c0ab13-edd2-49cd-b803-aa9cc75bb189",
      "store_id": "a2b6f62e-3bf9-5f02-9f0f-fb553d5b5d02",
      "service_category_id": 11,
      "service_category_name": "Medicine Delivery",
      "service_category_icon": "http://localhost/storage/img/service-category/medicine-delivery.png",
      "store_name": "Medicine Store",
      "store_banner": "http://localhost/storage/img/store-images/medicine-store.jpg",
      "store_status": 1,
      "average_rating": 4.6,
      "product_category": "Tablet Sub,Pain Killers sub",
      "description": "Seeded store for store-list API testing.",
      "delivery_time": 30,
      "order_min_amount": 20,
      "offer": "Get 5%  off on orders above $10",
      "offer_min_amount": 10,
      "offer_amount": 5,
      "offer_type": 2,
      "is_fav_store": 1,
      "taken_away_type": 2,
      "address": "The Spire 2, BRTS, 150 Feet Ring Rd, nr. Shital Park, Shastri Nagar, Dharam Nagar, Rajkot",
      "latitude": "22.31572603394304",
      "longitude": "70.7674083384962",
      "packaging_charges": 2,
      "order_detail": [
          {
              "product_id": "f3e1944d-5f7a-474e-b53c-adb7cf7cd002",
              "product_name": "Veg Pizza",
              "product_amount": 8,
              "product_total_amount": 24,
              "discount_amount": 0,
              "offer_discount": 0,
              "product_food_type": 1,
              "product_quantity": 3,
              "product_size_ids": 0
          }
      ]
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The order id field is required."
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

