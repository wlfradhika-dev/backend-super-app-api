docs: |+
  ## Check Service Status

  Checks and returns the current availability/active status of the requested service.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "is_register": 1,
      "store_id": "a08fc68a-7786-412c-b021-c56434279cb3",
      "contact_number": "7099",
      "select_country_code": "+1",
      "login_type": "email",
      "cash_payment": 1,
      "card_payment": 1,
      "wallet_payment": 1,
      "select_currency": "$",
      "select_language": "en",
      "unique_id": "23136b54-6665-4a50-9450-8224bdb35952",
      "token": null,
      "server_time_zone": "UTC",
      "store_service_id": "f2a6f62e-3bf9-4f12-9f0f-fb553d5b5d01",
      "service_status": 1,
      "service_message": "",
      "service_category_name": "Food Delivery",
      "service_current_status": 1,
      "store_name": "Food Store",
      "store_provider_name": "Food Store",
      "provider_profile_image": null,
      "store_banner": "http://127.0.0.1:8000/storage/img/store-images/food-store.jpg",
      "email": "store@gmail.comm"
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

