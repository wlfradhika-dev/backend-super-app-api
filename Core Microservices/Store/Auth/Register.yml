docs: |+
  ## Register

  Creates a new user account with the provided details and sends an OTP for contact verification.

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `contact_number` | string | Yes | Contact number |
  | `select_country_code` | string | Yes | Select country code |
  | `full_name` | string | Yes | Full name |
  | `email` | string | Yes | Email |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
