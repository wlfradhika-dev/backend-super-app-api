      value: application/json
  body:
    type: multipart-form
    data:
      - name: contact_number
        type: text
        value: "7099"
      - name: select_country_code
        type: text
        value: "+1"
      - name: full_name
        type: text
        value: Store Testing
      - name: email
        type: text
        value: store@gmail.comm
  auth:
    type: bearer
    token: "{{store_token}}"

