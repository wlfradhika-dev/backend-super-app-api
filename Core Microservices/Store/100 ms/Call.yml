docs: |+
  ## Call

  Initiates or manages an audio/video call session using the 100ms platform.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `receiver_id` | string | Yes | Receiver id |
  | `receiver_type` | string | Yes | Receiver type |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "sender_token": "eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9..HLhonBPiqpDq7_i70aEDIovCTZtaGg3tyzrDMTOZ1oA",
      "room_id": "699d9401f0864c851a1ae7d0"
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The receiver id field is required."
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

