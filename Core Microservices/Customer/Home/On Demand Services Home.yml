docs: |+
  ## On Demand Services Home

  Returns the homepage data including available services, banners, and promotional content.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `app_version` | string | Yes | App version |
  | `current_lat` | string | Yes | Current lat |
  | `current_long` | string | Yes | Current long |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "services": [
          {
              "service_category_id": 14,
              "category_type": 6,
              "is_sub_cat_flow": 0,
              "service_category_name": "Astrology",
              "ride_flow_type": 1,
              "service_category_icon": "http://127.0.0.1:8000/storage/img/service-category/default.png"
          }
      ],
      "total_ongoing_order": 0,
      "total_unread_message": 0
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The app version field is required."
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

