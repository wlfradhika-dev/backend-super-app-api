docs: |+
  ## Home

  Returns the homepage data including available services, banners, and promotional content.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `app_version` | string | Yes | App version |
  | `current_lat` | string | Yes | Current lat |
  | `current_long` | string | Yes | Current long |
  | `device_token` | string | Yes | Device token |

  ---

  ### Responses

