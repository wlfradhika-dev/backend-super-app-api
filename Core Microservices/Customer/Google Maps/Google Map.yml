docs: |+
  ## Google Map

  Generates a Google Maps URL for the given location or route.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `url` | string | Yes | Url |

  ---

  ### Responses

