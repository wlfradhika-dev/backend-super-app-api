docs: |+
  ## Place Details

  Returns detailed information about a place using its Google Places ID.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `place_id` | string | Yes | Place id |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "formattedAddress": "Rajkot, Gujarat, India",
      "addressComponents": [
          {
              "longText": "Rajkot",
              "shortText": "Rajkot",
              "types": [
                  "locality",
                  "political"
              ],
              "languageCode": "en"
          },
          {
              "longText": "Rajkot",
              "shortText": "Rajkot",
              "types": [
                  "administrative_area_level_3",
                  "political"
              ],
              "languageCode": "en"
          },
          {
              "longText": "Gujarat",
              "shortText": "GJ",
              "types": [
                  "administrative_area_level_1",
                  "political"
              ],
              "languageCode": "en"
          },
          {
              "longText": "India",
              "shortText": "IN",
              "types": [
                  "country",
                  "political"
              ],
              "languageCode": "en"
          }
      ],
      "location": {
          "latitude": 22.3038945,
          "longitude": 70.80215989999999
      },
      "displayName": {
          "text": "Rajkot",
          "languageCode": "en"
      }
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The place id field is required."
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

