docs: |+
  ## Route Details

  Returns distance, duration, and route polyline between two coordinates using Google Maps.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `pickup_latitude` | string | Yes | Pickup latitude |
  | `pickup_longitude` | string | Yes | Pickup longitude |
  | `drop_latitude` | string | Yes | Drop latitude |
  | `drop_longitude` | string | Yes | Drop longitude |
  | `waypoint` | string | Yes | Waypoint |

  ---

