docs: |+
  ## History

  Returns the detailed information of the specified record.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "refer_info": [
          {
              "name": "Rahul",
              "refer_discount_type": 2,
              "refer_discount": 20,
              "refer_status": 0
          }
      ],
      "used_info": {
          "name": "Rahul",
          "user_discount_type": 2,
          "user_discount": 10,
          "user_status": 0
      }
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

