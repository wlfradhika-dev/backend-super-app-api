docs: |+
  ## Contact Verification

  Verifies the OTP sent to the user's contact number and issues a bearer token on success.

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `otp` | string | Yes | Otp |
  | `device_token` | string | Yes | Device token |
  | `select_country_code` | string | No | nullable - only need when change from edit profile |
  | `contact_number` | string | No | nullable - only need when change from edit profile |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "status": 1,
      "is_register": 0,
      "user_id": "d0c7e7d8-cd62-46c8-8c90-e394b84b58ef",
      "contact_number": "123",
      "select_country_code": "+1",
      "login_type": "email",
      "cash_payment": 1,
      "card_payment": 1,
      "wallet_payment": 1,
      "select_currency": "$",
      "currency_code": "USD",
      "select_language": "en",
      "unique_id": "d52e3fd7-2e35-43bd-8001-d378794f8ce7",
      "token": "10|5VC7nAUnbkHqMFd4P56vRGOxxEQOMIVBoa5jmgXz53ff12df"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The otp field is required."
  }
  ```

  **403 Forbidden — Account Blocked**

  ```json
  {
      "success": false,
      "message": "Your account is blocked and not authorized to use application!",
      "message_code": 3,
      "status_code": 3,
      "https_status_code": 403,
      "errors": "Failed"
  }
  ```

