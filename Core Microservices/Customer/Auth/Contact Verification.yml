info:
  name: Contact Verification
  type: http
  seq: 4

http:
  method: POST
  url: "{{core_url}}/api/customer/contact-verification"
  headers:
    - name: Accept
      value: application/json
  body:
    type: multipart-form
    data:
      - name: otp
        type: text
        value: "123456"
      - name: device_token
        type: text
        value: "123456"
      - name: select_country_code
        type: text
        value: ""
        description: nullable - only need when change from edit profile
        disabled: true
      - name: contact_number
        type: text
        value: ""
        description: nullable - only need when change from edit profile
        disabled: true
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        try {
          let response = res.getBody();

          if (typeof response === "string") {
            response = JSON.parse(response);
          }

          if (response && response.token) {
            bru.setVar("token", response.token);
            console.log("Token saved:", response.token);
          }
        } catch (err) {
          console.log("Script error:", err);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

