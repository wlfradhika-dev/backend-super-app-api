info:
  name: Login
  type: http
  seq: 2

http:
  method: POST
  url: "{{core_url}}/api/customer/login"
  headers:
    - name: Accept
      value: application/json
    - name: select-time-zone
      value: Asia/Kolkata
    - name: select-ip-address
      value: 103.138.233.214
  body:
    type: multipart-form
    data:
      - name: login_type
        type: text
        value: email
        description: "Login strategy. Allowed values: 'email', 'google', 'facebook', 'apple'"
      - name: device_token
        type: text
        value: "123456"
        description: FCM (Android) or APNs (iOS) push notification token of the customer's device
      - name: select_language
        type: text
        value: en
        description: Preferred language code for the session (e.g. en, ar)
      - name: select_currency
        type: text
        value: $
        description: Preferred currency symbol for the session (e.g. $, INR)
      - name: login_device
        type: text
        value: "1"
        description: "Device platform: 1 = Flutter Android, 2 = Flutter iOS"
      - name: contact_number
        type: text
        value: "5555"
        description: Customer's phone number. Required when login_type is 'email'
      - name: select_country_code
        type: text
        value: "+91"
        description: International dial code (e.g. +91, +1). Required when login_type is 'email'
      - name: login_id
        type: text
        value: ""
        description: Unique user ID from the social provider (Google/Facebook/Apple). Required when login_type is 'google', 'facebook', or 'apple'
        disabled: true
      - name: full_name
        type: text
        value: ""
        description: Customer's full name from the social provider. Required when login_type is 'google', 'facebook', or 'apple'
        disabled: true
      - name: profile_image
        type: text
        value: ""
        description: Profile picture URL from the social provider. Optional / nullable
        disabled: true
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        try {
          const response = res.getBody();

          let data = response;

          if (typeof data === "string") {
            data = JSON.parse(data);
          }

          if (data && data.token) {
            bru.setVar("token", data.token);
            console.log("Token updated from login:", data.token);
          }

          if (data && data.user_id) {
            bru.setVar("user_id", data.user_id);
            console.log("User ID saved:", data.user_id);
          }

        } catch (err) {
          console.log("Script error:", err);
        }

