docs: |-
  ## Customer Login

  Authenticates a customer and returns a Bearer token along with the customer profile. Supports multiple login strategies: **email/phone**, **Google**, **Facebook**, and **Apple**.

  On first social login, a new customer account is automatically created.

  The returned Bearer token is auto-saved to the `{{token}}` collection variable via the test script and must be passed in the `Authorization` header for all subsequent authenticated requests.

  ---

  ### Authentication

  No authentication required. This is a public endpoint.

  ---

  ### Headers

  | Key | Required | Description |
  | --- | --- | --- |
  | `Accept` | Yes | Must be `application/json` |
  | `select-time-zone` | Yes | Customer's local timezone in IANA format (e.g. `Asia/Kolkata`, `America/New_York`) |
  | `select-ip-address` | Yes | Customer's IP address used for geo-detection and location-based services |

  ---

  ### Request Body (`multipart/form-data`)

  | Field | Type | Required | Description |
  | --- | --- | --- | --- |
  | `login_type` | string | Yes | Login strategy. Allowed values: `email`, `google`, `facebook`, `apple` |
  | `device_token` | string | Yes | FCM (Android) or APNs (iOS) push notification token for the device |
  | `select_language` | string | Yes | Preferred language code for the session (e.g. `en`, `ar`) |
  | `select_currency` | string | Yes | Preferred currency symbol for the session (e.g. `$`, `₹`) |
  | `login_device` | integer | Yes | Device platform: `1` = Flutter Android, `2` = Flutter iOS |
  | `contact_number` | string | Conditional | Customer's phone number. **Required when** **`login_type`** **\=** **`email`** |
  | `select_country_code` | string | Conditional | International dial code (e.g. `+91`, `+1`). **Required when** **`login_type`** **\=** **`email`** |
  | `login_id` | string | Conditional | Unique user ID from the social provider. **Required when** **`login_type`** **\=** **`google`****,** **`facebook`****, or** **`apple`** |
  | `full_name` | string | Conditional | Customer's full name from the social provider. **Required when** **`login_type`** **\=** **`google`****,** **`facebook`****, or** **`apple`** |
  | `profile_image` | string | No | Profile picture URL from the social provider. Nullable |

  ---

  ### Responses

  **200 OK — Success**

  ``` json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "status": 1,
      "is_register": 0,
      "user_id": "d0c7e7d8-cd62-46c8-8c90-e394b84b58ef",
      "contact_number": "123",
      "select_country_code": "+1",
      "login_type": "email",
      "cash_payment": 1,
      "card_payment": 1,
      "wallet_payment": 1,
      "select_currency": "$",
      "currency_code": "USD",
      "select_language": "en",
      "unique_id": "d52e3fd7-2e35-43bd-8001-d378794f8ce7",
      "token": "9|PhlQpL52so5srGjUl8Htg769U59ai2VKVZOv5qIvfc86ec56"
  }

   ```

  **422 Unprocessable Entity — Validation Failed**

  ``` json
  {
      "status": 0,
      "message": "The login type field is required."
  }

   ```

  **403 Forbidden — Account Blocked**

  ``` json
  {
      "success": false,
      "message": "Your account is blocked and not authorized to use application!",
      "message_code": 3,
      "status_code": 3,
      "https_status_code": 403,
      "errors": "Failed"
  }

   ```
