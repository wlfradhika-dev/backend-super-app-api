docs: |-
  ## Register

  Creates a new user account with the provided details and sends an OTP for contact verification.

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  | --- | --- | --- | --- |
  | `contact_number` | string | Yes | Contact number |
  | `select_country_code` | string | Yes | Select country code |
  | `full_name` | string | Yes | Full name |
  | `email` | string | Yes | Email |
  | `refer_code` | string | No | nullable |

  ---

  ### Responses

  **200 OK — Success**

  ``` json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "status": 1,
      "is_register": 1,
      "user_id": "d0c7e7d8-cd62-46c8-8c90-e394b84b58ef",
      "contact_number": "123",
      "select_country_code": "+1",
      "login_type": "email",
      "cash_payment": 1,
      "card_payment": 1,
      "wallet_payment": 1,
      "select_currency": "$",
      "currency_code": "USD",
      "select_language": "en",
      "unique_id": "d52e3fd7-2e35-43bd-8001-d378794f8ce7",
      "token": "11|0aKcAXb9TON4tSCkIZUPn6aNNFFe210n3CY9Q6oT329ff456",
      "user_name": "Rahul",
      "email": "rahul@gmail.comm",
      "referral_code": "ZHTEOYJ",
      "gender": "0",
      "profile_image": null,
      "emergency_contact": "",
      "emergency_country_code": "",
      "server_time_zone": "UTC"
  }

   ```

  **422 Unprocessable Entity — Validation Failed**

  ``` json
  {
      "status": 0,
      "message": "The contact number field is required."
  }

   ```
