docs: |+
  ## Get Total Points

  Returns the total accumulated loyalty/reward points for the authenticated user.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "total_points": 0
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

