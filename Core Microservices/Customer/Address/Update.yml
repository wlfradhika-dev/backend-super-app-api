docs: |-
  ## Update

  Manages the user's saved addresses for service bookings.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}

   ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  | --- | --- | --- | --- |
  | `address` | string | Yes | Address |
  | `type` | string | Yes | 1-home, 2-work, 3-other |
  | `lat` | string | Yes | Lat |
  | `long` | string | Yes | Long |
  | `flat_no` | string | Yes | Flat no |
  | `landmark` | string | Yes | Landmark |
  | `address_id` | string | Yes | Address id |

  ---

  ### Responses

  **200 OK — Success**

  ``` json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "address_id": "27b5b882-d7db-47ae-8c86-a109e1247b25"
  }

   ```

  **401 Unauthorized — App Access Denied**

  ``` json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }

   ```

  **422 Unprocessable Entity — Validation Failed**

  ``` json
  {
      "status": 0,
      "message": "The address field is required."
  }

   ```

  **404 Not Found — User Not Found**

  ``` json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }

   ```
