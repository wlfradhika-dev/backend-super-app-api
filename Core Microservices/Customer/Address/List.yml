docs: |+
  ## List

  Manages the user's saved addresses for service bookings.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "type_list": [
          {
              "type": 1,
              "address_list": [
                  {
                      "address_id": "27b5b882-d7db-47ae-8c86-a109e1247b25",
                      "address": "Shital park",
                      "flat_no": "2b",
                      "landmark": "rajkot",
                      "lat": 123455,
                      "long": 123445
                  }
              ]
          }
      ],
      "max_address_limit": 5
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

