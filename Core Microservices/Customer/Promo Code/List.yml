docs: |+
  ## List

  Validates and applies a promo code to the current service, returning the applicable discount.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `service_category_id` | string | Yes | Service category id |
  | `order_amount` | string | Yes | Order amount |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "promocode_list": [
          {
              "promocode_id": "acb95ac2-3283-432e-8227-7dfa6ef7d5c9",
              "promocode_name": "PROMO10",
              "discount_amount": 20,
              "discount_type": 2,
              "min_order_amount": 10,
              "max_discount_amount": 100,
              "promocode_description": "get 20% discount",
              "is_promocode_valid": 1
          }
      ]
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The service category id field is required."
  }
  ```

