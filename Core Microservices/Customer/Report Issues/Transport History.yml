docs: |+
  ## Transport History

  Handles report issues and frequently asked questions for user support.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `timezone` | string | Yes | Timezone |
  | `filter_type` | string | Yes |  0 = all, 1 = today, 2 = last 7 days, 3 = last 30 days, 4 = this year, 5 = upcoming order, 6 = last 365 days |
  | `service_category` | string | Yes | transport category ids |
  | `status` | string | Yes | 1 = un-resolved, 2 = resolved |
  | `per_page` | string | Yes | Per page |
  | `page` | string | Yes | Page |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "current_page": 1,
      "last_page": 1,
      "total": 1,
      "report_issue_history": [
          {
              "report_id": "0906937a-197c-43cc-8519-4ec4415bce31",
              "reference_no": "RI-EQ0SBU3WN3",
              "order_no": "ORD-12345",
              "category_icon": "http://127.0.0.1:8000/storage/img/service-category/11362120242806.png",
              "category_name": "Car Rental",
              "service_category_id": 32,
              "status": 1,
              "report_issue_date_time": "2026-02-18 10:30:42"
          }
      ]
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The timezone field is required."
  }
  ```

