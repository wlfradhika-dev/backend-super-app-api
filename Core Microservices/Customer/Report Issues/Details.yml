docs: |+
  ## Details

  Handles report issues and frequently asked questions for user support.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `report_id` | string | Yes | Report id |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "reference_no": "RI-EQ0SBU3WN3",
      "order_no": "ORD-12345",
      "description": "Driver was rude and unprofessional",
      "images": [
          {
              "id": "c5b5c996-b5b5-4e3d-a1e6-3641c97160b7",
              "image": "http://127.0.0.1:8000/storage/img/report-issue/Zj4OP0KFKxIFroOm.jpg"
          }
      ],
      "report_chat_number": "RI-EQ0SBU3WN3-0906937a-197c-43cc-8519-4ec4415bce31",
      "min_report_issue_image_upload": 1,
      "max_report_issue_image_upload": 2
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The report id field is required."
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

