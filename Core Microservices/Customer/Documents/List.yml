docs: |+
  ## List

  Handles document upload and management for the user's verification requirements.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `service_category_id` | string | Yes | Service category id |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "required_document_list": [
          {
              "service_cat_id": 32,
              "service_cat_name": "Car Rental",
              "document_list": [
                  {
                      "document_id": "08371e48-b9bc-41a3-8dc3-369445957417",
                      "document_name": "Licence",
                      "document_file_url": "",
                      "document_status": 4,
                      "is_allow_document_expiry": 0,
                      "expire_date": ""
                  }
              ]
          }
      ]
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The service category id field is required."
  }
  ```

