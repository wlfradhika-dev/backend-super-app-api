docs: |+
  ## List For filters

  Returns a paginated list of records matching the request criteria.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `service_type` | string | Yes | Service type |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "services": [
          {
              "service_category_id": 1,
              "category_type": 1,
              "service_category_name": "Bike Ride",
              "service_category_icon": "http://127.0.0.1:8000/storage/img/service-category/11345620242806.png"
          },
          {
              "service_category_id": 2,
              "category_type": 1,
              "service_category_name": "Taxi Ride",
              "service_category_icon": "http://127.0.0.1:8000/storage/img/service-category/11350720242806.png"
          },
          {
              "service_category_id": 3,
              "category_type": 1,
              "service_category_name": "Intercity",
              "service_category_icon": "http://127.0.0.1:8000/storage/img/service-category/11353120242806.png"
          },
          {
              "service_category_id": 5,
              "category_type": 1,
              "service_category_name": "Taxi Bidding",
              "service_category_icon": "http://127.0.0.1:8000/storage/img/service-category/11354920242806.png"
          },
          {
              "service_category_id": 6,
              "category_type": 1,
              "service_category_name": "Taxi Pool",
              "service_category_icon": "http://127.0.0.1:8000/storage/img/service-category/11360920242806.png"
          },
          {
              "service_category_id": 32,
              "category_type": 1,
              "service_category_name": "Car Rental",
              "service_category_icon": "http://127.0.0.1:8000/storage/img/service-category/11362120242806.png"
          }
      ]
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The service type field is required."
  }
  ```

