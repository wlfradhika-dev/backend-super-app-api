docs: |+
  ## Service Register

  Registers the driver for a specific service category, associating them with the selected service type.

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `step` | string | Yes | 0,1,2,3,4 |
  | `landmark` | string | No | nullable |
  | `address` | string | Yes | requried for step 1 |
  | `lat` | string | Yes | requried for step 1 |
  | `long` | string | Yes | requried for step 1 |
  | `service_radius` | string | Yes | requried for step 1 |
  | `service_category_id` | string | Yes | requried for step 2,3,4 |
  | `service_sub_category_id` | string | Yes | requried for step 3 |
  | `package_description` | string | Yes | requried for step 3 |
  | `package_price` | string | Yes | requried for step 3 |
  | `package_name` | string | Yes | requried for step 3 & when category_type 3 & 4  |
  | `max_book_quantity` | string | Yes | requried for step 3 & when category_type 3 & 4  |
  | `document_id` | string | Yes | requried for step 4 |
  | `is_update` | string | Yes | requried for step 4 & should be 0 or 1 |
  | `document_file` | string | Yes | requried for step 4 & when is_update = 0 |
  | `expire_date` | string | Yes | Expire date |
  | `category_type` | string | No | nullable |
  | `select_country_code` | string | No | nullable |
  | `contact_number` | string | No | nullable |
  | `email` | string | No | nullable |

  ---

  ### Responses

  **200 OK — Success**

