docs: |+
  ## Finger Login

  Authenticates the user using fingerprint or face unlock biometric credentials stored on the device.

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `login_type` | string | Yes | Login type |
  | `device_token` | string | Yes | Device token |
  | `select_language` | string | Yes | Select language |
  | `select_currency` | string | Yes | Select currency |
  | `select_country_code` | string | Yes | Select country code |
  | `login_device` | string | Yes | 1:Flutter-Android, 2:Flutter-Ios |
  | `login_id` | string | Yes | Login id |
  | `unique_id` | string | Yes | Unique id |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "is_register": 1,
      "provider_id": "50029379-b361-47da-9fa6-a9016af922d1",
      "contact_number": "123",
      "select_country_code": "+1",
      "login_type": "email",
      "cash_payment": 1,
      "card_payment": 1,
      "wallet_payment": 1,
      "select_currency": "$",
      "select_language": "en",
      "unique_id": "aeed692f-db96-4a2c-b5a2-e729f791f10c",
      "token": "7|pnpGNZEkrfIVPgI545rIWETTMF1dX0nj6NWrBPhu3136fa52",
      "server_time_zone": "UTC",
      "provider_name": "Rahul",
      "provider_last_name": "",
      "email": "rahul@gmail.comm",
      "profile_image": null,
      "provider_current_status": 0,
      "completed_step": 0,
      "service_radius": 0,
      "address": "",
      "landmark": "",
      "lat_long": "",
      "min_order": 0,
      "is_allowed_provider_location": 0
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The login type field is required."
  }
  ```

  **403 Forbidden — Account Blocked**

  ```json
  {
      "success": false,
      "message": "Your account is blocked and not authorized to use application!",
      "message_code": 3,
      "status_code": 3,
      "https_status_code": 403,
      "errors": "Failed"
  }
  ```

