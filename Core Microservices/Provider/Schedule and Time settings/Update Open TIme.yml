  type: http
  seq: 1

http:
  method: POST
  url: "{{core_url}}/api/provider/update-open-time"
  headers:
    - name: Accept
      value: application/json
  body:
    type: multipart-form
    data:
      - name: day
        type: text
        value: SAT
      - name: open_timing
        type: text
        value: '["15:00:00-16:00:00"]'
      - name: open_timing
        type: text
        value: '["18:00:00-19:00:00","19:00:00-20:00:00","21:00:00-22:00:00","22:00:00-23:00:00"]'
        disabled: true
  auth:
    type: bearer
    token: "{{provider_token}}"

settings:
