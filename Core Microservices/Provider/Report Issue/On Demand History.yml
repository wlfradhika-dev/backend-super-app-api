docs: |+
  ## On Demand History

  Handles report issues and frequently asked questions for user support.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `timezone` | string | Yes | Timezone |
  | `filter_type` | string | Yes | Filter type |
  | `status` | string | Yes | Status |
  | `service_category` | string | Yes | Service category |
  | `per_page` | string | Yes | Per page |
  | `page` | string | Yes | Page |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "current_page": 1,
      "last_page": 1,
      "total": 1,
      "report_issue_history": [
          {
              "report_id": "df41f460-a973-4db7-931d-55f40ae20b72",
              "reference_no": "RI-7UH2POXBND",
              "order_no": "258741369",
              "category_icon": "http://localhost/storage/img/service-category/10060120251301.png",
              "category_name": "Dog Walking",
              "service_category_id": 13,
              "status": 1,
              "report_issue_date_time": "2026-02-26 04:57:14"
          }
      ]
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The timezone field is required."
  }
  ```

