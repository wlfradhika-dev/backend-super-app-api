docs: |+
  ## Upload Image

  Handles document upload and management for the user's verification requirements.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `report_id` | string | Yes | Report id |
  | `image` | string | Yes | Image |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "image": [
          {
              "id": "0e09f869-0f9c-45c9-8012-cac4f9233352",
              "image": "http://localhost/storage/img/report-issue/oGHZhAa11cHMvMAx.jpg"
          },
          {
              "id": "fa31a3be-55b1-4a48-abe3-9b747a12596e",
              "image": "http://localhost/storage/img/report-issue/DoxVn3qMVgN1aMCa.jpg"
          }
      ],
      "is_image_valid": 1
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The report id field is required."
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

