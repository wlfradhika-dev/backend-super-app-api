docs: |+
  ## Details

  Handles report issues and frequently asked questions for user support.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `report_id` | string | Yes | Report id |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "reference_no": "RI-7UH2POXBND",
      "order_no": "258741369",
      "description": null,
      "images": [
          {
              "id": "0e09f869-0f9c-45c9-8012-cac4f9233352",
              "image": "http://localhost/storage/img/report-issue/oGHZhAa11cHMvMAx.jpg"
          }
      ],
      "report_chat_number": "RI-7UH2POXBND-df41f460-a973-4db7-931d-55f40ae20b72",
      "min_report_issue_image_upload": 1,
      "max_report_issue_image_upload": 2
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The report id field is required."
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

