docs: |+
  ## Lists

  Handles document upload and management for the user's verification requirements.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `service_category_id` | string | Yes | Service category id |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "required_document_list": [
          {
              "service_cat_id": 13,
              "service_cat_name": "Dog walking",
              "document_list": [
                  {
                      "document_id": "f80ab338-864b-4d4c-8c69-cce76e9e916e",
                      "document_name": "Government ID Proof",
                      "document_file_url": "http://127.0.0.1:8000/storage/img/on-demand-provider-documents/xJDUrKQndsUPoRL9.jpg",
                      "document_status": 1,
                      "is_expiry": 0,
                      "expire_date": ""
                  },
                  {
                      "document_id": "f4bdfa03-c398-46b5-989d-4ee950cd66a3",
                      "document_name": "Professional License",
                      "document_file_url": "",
                      "document_status": 4,
                      "is_expiry": 1,
                      "expire_date": ""
                  }
              ]
          }
      ]
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The service category id field is required."
  }
  ```

