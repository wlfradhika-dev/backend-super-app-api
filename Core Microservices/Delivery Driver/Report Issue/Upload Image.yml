docs: |+
  ## Upload Image

  Handles document upload and management for the user's verification requirements.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `report_id` | string | Yes | Report id |
  | `image` | string | Yes | Image |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "image": [
          {
              "id": "0bbfd62d-686e-46d9-9504-e4e19bb438f8",
              "image": "http://localhost/storage/img/report-issue/rfJ5HYcdSe3HTn6E.jpg"
          },
          {
              "id": "9c3f6847-9b99-43a8-9300-7e481ead9e8f",
              "image": "http://localhost/storage/img/report-issue/5MJS4EoqM5IpW334.jpg"
          }
      ],
      "is_image_valid": 1
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The report id field is required."
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

