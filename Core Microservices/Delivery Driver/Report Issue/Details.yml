docs: |+
  ## Details

  Handles report issues and frequently asked questions for user support.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `report_id` | string | Yes | Report id |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "reference_no": "RI-CPVAXAZVNN",
      "order_no": "789456132",
      "description": "description",
      "images": [
          {
              "id": "0bbfd62d-686e-46d9-9504-e4e19bb438f8",
              "image": "http://localhost/storage/img/report-issue/rfJ5HYcdSe3HTn6E.jpg"
          }
      ],
      "report_chat_number": "RI-CPVAXAZVNN-fa74e124-f1e6-4d98-81d7-1f25480c1f62",
      "min_report_issue_image_upload": 1,
      "max_report_issue_image_upload": 2
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The report id field is required."
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

