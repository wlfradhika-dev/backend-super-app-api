docs: |+
  ## Get Service Type Document List

  Handles document upload and management for the user's verification requirements.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `service_category_id` | string | Yes | Service category id |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "vehicle_type_list": [
          {
              "vehicle_type_id": "2239b831-c26e-4fbd-8514-20196c7574ed",
              "vehicle_type_name": "Street",
              "vehicle_type_icon": null
          },
          {
              "vehicle_type_id": "4613989f-b71b-4aa3-bfdb-5cb3fedd9002",
              "vehicle_type_name": "Cruiser",
              "vehicle_type_icon": null
          },
          {
              "vehicle_type_id": "3896a78b-01b2-45dd-92f5-99faa420495f",
              "vehicle_type_name": "Sports",
              "vehicle_type_icon": null
          },
          {
              "vehicle_type_id": "e1e4a9cf-f1fd-4cb5-a8a0-aa3c832a5feb",
              "vehicle_type_name": "Scooter",
              "vehicle_type_icon": null
          }
      ],
      "required_document_list": [
          {
              "document_id": "4fe5c488-2c56-4b22-b55f-5c574bdec5f0",
              "document_name": "Driving License"
          },
          {
              "document_id": "e1ca560a-bfbf-41f8-81d6-33706d991afd",
              "document_name": "Vehicle Registration Certificate"
          }
      ]
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The service category id field is required."
  }
  ```

