http:
  method: POST
  url: "{{core_url}}/api/delivery-driver/finger-login"
  headers:
    - name: Accept
      value: application/json
    - name: select-time-zone
      value: Asia/Kolkata
    - name: select-ip-address
      value: 103.138.233.214
  body:
    type: multipart-form
    data:
      - name: login_type
        type: text
        value: fingerprint
      - name: device_token
        type: text
        value: "123456"
      - name: select_language
        type: text
        value: en
      - name: select_currency
        type: text
        value: $
      - name: select_country_code
        type: text
        value: "+1"
      - name: login_device
        type: text
        value: "1"
        description: 1:Flutter-Android, 2:Flutter-Ios
      - name: login_id
        type: text
        value: 7fd08baf-2c21-4574-a134-ca27fd0c3a8a
      - name: unique_id
        type: text
        value: db948527-6532-420c-af54-34ff44a6b4f0
  auth:
    type: bearer
    token: "{{driver_token}}"

