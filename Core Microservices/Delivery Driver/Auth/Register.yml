docs: |+
  ## Register

  Creates a new user account with the provided details and sends an OTP for contact verification.

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `contact_number` | string | Yes | Contact number |
  | `select_country_code` | string | Yes | Select country code |
  | `full_name` | string | Yes | Full name |
  | `email` | string | Yes | Email |
  | `refer_code` | string | No | nullable  |
  | `gender` | string | Yes | Gender |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "is_register": 1,
      "driver_id": "7fd08baf-2c21-4574-a134-ca27fd0c3a8a",
      "contact_number": "12345",
      "select_country_code": "+1",
      "login_type": "email",
      "cash_payment": 1,
      "card_payment": 1,
      "wallet_payment": 1,
      "select_currency": "$",
      "currency_code": "USD",
      "select_language": "en",
      "unique_id": "db948527-6532-420c-af54-34ff44a6b4f0",
      "gender": "1",
      "driver_name": "Rahul",
      "email": "rahul@gmail.commm",
      "profile_image": null,
      "server_time_zone": "UTC",
      "token": "40|C3gQ3lav5iR8jINX0vUyzLRZYHZ3a8W2eIv3LFDy46ab94f0",
      "driver_service_id": 0,
      "service_status": 4,
      "service_category_id": 0,
      "driver_current_status": 0,
      "driver_service": "",
      "vehicle_type_icon": "",
      "vehicle_type_name": "",
      "vehicle_company": "",
      "plat_no": "",
      "model_year": "",
      "model_name": "",
      "vehicle_color": "",
      "service_type_id": 0,
      "is_ride_service": 0
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The contact number field is required."
  }
  ```

