docs: |+
  ## Contact Verification

  Verifies the OTP sent to the user's contact number and issues a bearer token on success.

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `otp` | string | Yes | Otp |
  | `device_token` | string | Yes | Device token |
  | `select_country_code` | string | No | nullable - only need when change from edit profile |
  | `contact_number` | string | No | nullable - only need when change from edit profile |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "is_register": 0,
      "driver_id": "7fd08baf-2c21-4574-a134-ca27fd0c3a8a",
      "contact_number": "12345",
      "select_country_code": "+1",
      "login_type": "email",
      "cash_payment": 1,
      "card_payment": 1,
      "wallet_payment": 1,
      "select_currency": "$",
      "currency_code": "USD",
      "select_language": "en",
      "unique_id": "db948527-6532-420c-af54-34ff44a6b4f0",
      "gender": "0",
      "driver_name": "",
      "email": "",
      "profile_image": null,
      "server_time_zone": "UTC",
      "token": "39|prRgDestVGJNgM5NLA6Q6EP0R1WDaumJ2UXI9nVs65393803",
      "driver_service_id": 0,
      "service_status": 4,
      "service_category_id": 0,
      "driver_current_status": 0,
      "driver_service": "",
      "vehicle_type_icon": "",
      "vehicle_type_name": "",
      "vehicle_company": "",
      "plat_no": "",
      "model_year": "",
      "model_name": "",
      "vehicle_color": "",
      "service_type_id": 0,
      "is_ride_service": 0
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The otp field is required."
  }
  ```

  **403 Forbidden — Account Blocked**

  ```json
  {
      "success": false,
      "message": "Your account is blocked and not authorized to use application!",
      "message_code": 3,
      "status_code": 3,
      "https_status_code": 403,
      "errors": "Failed"
  }
  ```

