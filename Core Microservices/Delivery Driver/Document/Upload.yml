docs: |+
  ## Upload

  Handles document upload and management for the user's verification requirements.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `service_category_id` | string | Yes | Service category id |
  | `document_id` | string | Yes | Document id |
  | `document_file` | string | Yes | Document file |
  | `expire_date` | string | Yes | Expire date |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "required_document_list": [
          {
              "service_cat_id": 1,
              "service_cat_name": "Bike Ride",
              "document_list": [
                  {
                      "document_id": "4fe5c488-2c56-4b22-b55f-5c574bdec5f0",
                      "document_name": "Driving License",
                      "document_file_url": "http://127.0.0.1:8000/storage/img/driver-documents/DvagnofXoDAUNtlD.jpg",
                      "document_status": 1,
                      "is_expiry": 1,
                      "expire_date": "31/12/2026"
                  },
                  {
                      "document_id": "e1ca560a-bfbf-41f8-81d6-33706d991afd",
                      "document_name": "Vehicle Registration Certificate",
                      "document_file_url": "",
                      "document_status": 4,
                      "is_expiry": 1,
                      "expire_date": ""
                  }
              ]
          }
      ]
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The service category id field is required."
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

