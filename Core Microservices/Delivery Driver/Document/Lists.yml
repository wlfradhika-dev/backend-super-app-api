info:
  name: Lists
  type: http
  seq: 1

http:
  method: POST
  url: "{{core_url}}/api/delivery-driver/document/list"
  headers:
    - name: Accept
      value: application/json
  body:
    type: multipart-form
    data:
      - name: service_category_id
        type: text
        value: "2"
        disabled: true
  auth:
    type: bearer
    token: "{{driver_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

