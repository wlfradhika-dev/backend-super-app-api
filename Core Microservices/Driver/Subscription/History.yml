docs: |+
  ## History

  Manages subscription plans including listing, history, and cancellation for the authenticated user.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "subscription_plans": [
          {
              "id": "1f99c9ff-b6be-96ee-93eb-2575c2c4e35f",
              "name": "Monthly",
              "description": "Monthly Description",
              "no_of_plan_days": 30,
              "price_of_plan": 100,
              "purchase_date_time": "2026-02-23",
              "expiry_date_time": "2026-03-23",
              "is_purchased": 1
          }
      ]
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

