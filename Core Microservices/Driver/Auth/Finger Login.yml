docs: |+
  ## Finger Login

  Authenticates the user using fingerprint or face unlock biometric credentials stored on the device.

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `login_type` | string | Yes | Login type |
  | `device_token` | string | Yes | Device token |
  | `select_language` | string | Yes | Select language |
  | `select_currency` | string | Yes | Select currency |
  | `select_country_code` | string | Yes | Select country code |
  | `login_device` | string | Yes | 1:Flutter-Android, 2:Flutter-Ios |
  | `login_id` | string | Yes | Login id |
  | `unique_id` | string | Yes | Unique id |

  ---

  ### Responses

  **200 OK — Success**

