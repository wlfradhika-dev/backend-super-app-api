docs: |+
  ## Edit Profile

  Updates the profile information of the authenticated user.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `full_name` | string | Yes | Full name |
  | `email` | string | Yes | Email |
  | `contact_number` | string | Yes | Contact number |
  | `select_country_code` | string | Yes | Select country code |
  | `gender` | string | Yes | Gender |
  | `profile_image` | string | Yes | Profile image |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "driver_name": "Cruiser",
      "profile_image": "http://127.0.0.1:8000/storage/img/profile-images/driver/AEwNldRqKNAIPB4Z.jpg",
      "gender": 1,
      "contact_number": "9099",
      "select_country_code": "+1",
      "email": "cruiser@gmail.comm"
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The full name field is required."
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

