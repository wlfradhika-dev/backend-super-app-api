http:
  method: POST
  url: "{{core_url}}/api/driver/login"
  headers:
    - name: Accept
      value: application/json
    - name: select-time-zone
      value: Asia/Kolkata
    - name: select-ip-address
      value: 103.138.233.214
      disabled: true
  body:
    type: multipart-form
    data:
      - name: login_type
        type: text
        value: email
        description: "'facebook', 'google', 'email', 'apple'"
      - name: device_token
        type: text
        value: "123456"
      - name: select_language
        type: text
        value: en
      - name: select_currency
        type: text
        value: $
      - name: login_device
        type: text
        value: "1"
        description: 1:Flutter-Android, 2:Flutter-Ios
      - name: contact_number
        type: text
        value: "8088"
        description: required if email login
      - name: select_country_code
        type: text
        value: "+1"
        description: required if email login
      - name: login_id
        type: text
        value: '""'
        description: required if google, apple, facebook login
      - name: full_name
        type: text
        value: '""'
        description: required if google, apple, facebook login
      - name: profile_image
        type: text
        value: ""
        description: nullable
  auth:
    type: bearer
    token: "{{driver_token}}"

