docs: |+
  ## Login

  Authenticates the user with the provided credentials and returns a bearer token for subsequent requests.

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `login_type` | string | Yes | 'facebook', 'google', 'email', 'apple' |
  | `device_token` | string | Yes | Device token |
  | `select_language` | string | Yes | Select language |
  | `select_currency` | string | Yes | Select currency |
  | `login_device` | string | Yes | 1:Flutter-Android, 2:Flutter-Ios |
  | `contact_number` | string | Yes | required if email login |
  | `select_country_code` | string | Yes | required if email login |
  | `login_id` | string | Yes | required if google, apple, facebook login |
  | `full_name` | string | Yes | required if google, apple, facebook login |
  | `profile_image` | string | No | nullable |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "status": 1,
      "is_register": 0,
      "driver_id": "fe94ab9a-8739-4567-937d-d906b22ff716",
      "contact_number": "123",
      "select_country_code": "+1",
      "login_type": "email",
      "cash_payment": 1,
      "card_payment": 1,
      "wallet_payment": 1,
      "select_currency": "$",
      "currency_code": "USD",
      "select_language": "en",
      "unique_id": "f1e44993-3398-441b-bb78-50937cc62d37",
      "gender": "",
      "driver_name": "",
      "email": "",
      "profile_image": null,
      "server_time_zone": "UTC",
      "token": "22|i0LGgcHCKd3HtCWB9YGIoPpWeHv6Vg28QUpRjtHX981ac1b4",
      "driver_service_id": 0,
      "service_status": 4,
      "service_category_id": 0,
      "driver_current_status": 0,
      "driver_service": "",
      "vehicle_type_icon": "",
      "vehicle_type_name": "",
      "vehicle_company": "",
      "plat_no": "",
      "model_year": "",
      "model_name": "",
      "vehicle_color": "",
      "service_type_id": 0,
      "is_ride_service": 0
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The login type field is required."
  }
  ```

  **403 Forbidden — Account Blocked**

  ```json
  {
      "success": false,
      "message": "Your account is blocked and not authorized to use application!",
      "message_code": 3,
      "status_code": 3,
      "https_status_code": 403,
      "errors": "Failed"
  }
  ```

