docs: |+
  ## Service Register

  Registers the driver for a specific service category, associating them with the selected service type.

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `service_category_id` | string | Yes | Service category id |
  | `current_lat` | string | Yes | Current lat |
  | `current_long` | string | Yes | Current long |
  | `vehicle_type_id` | string | Yes | Vehicle type id |
  | `manufacture_name` | string | Yes | Manufacture name |
  | `model_name` | string | Yes | Model name |
  | `model_year` | string | Yes | Model year |
  | `vehicle_plat_no` | string | Yes | Vehicle plat no |
  | `no_of_seat` | string | Yes | No of seat |
  | `handicap_accessibility` | string | Yes | Handicap accessibility |
  | `child_seat_accessibility` | string | Yes | Child seat accessibility |
  | `sub_service_list` | string | Yes | Sub service list |
  | `extra_service_list` | string | Yes | Extra service list |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "driver_service_id": "49458a1b-21dd-47e4-9e65-3119e748fd56",
      "service_status": 0,
      "driver_current_status": 1,
      "service_category_id": "2",
      "driver_service": "Taxi Bidding,Taxi Pool",
      "vehicle_type_icon": "258200720241007.png",
      "vehicle_type_name": "SUV"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The service category id field is required."
  }
  ```

