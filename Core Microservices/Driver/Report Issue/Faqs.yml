docs: |+
  ## Faqs

  Handles report issues and frequently asked questions for user support.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `timezone` | string | Yes | Timezone |
  | `filter_type` | string | Yes | Filter type |
  | `status` | string | Yes | Status |
  | `service_category` | string | Yes | Service category |
  | `per_page` | string | Yes | Per page |
  | `page` | string | Yes | Page |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "faqs": [
          {
              "id": "d709254c-3cb9-4843-a6af-3397341fa2c0",
              "name": "Issue",
              "description": "Tesing Report Issue"
          }
      ],
      "min_report_issue_image_upload": 1,
      "max_report_issue_image_upload": 2,
      "report_issue_count": 1
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The timezone field is required."
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

