docs: |+
  ## Upload Image

  Handles document upload and management for the user's verification requirements.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `report_id` | string | Yes | Report id |
  | `image` | string | Yes | Image |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "image": [
          {
              "id": "06e0f3fd-9056-4762-9883-5b9be02a0d4a",
              "image": "http://localhost/storage/img/report-issue/zgWFPzh4U4GZTUif.jpg"
          },
          {
              "id": "d20035d7-5b47-43ad-a1df-58b4dacb2f29",
              "image": "http://localhost/storage/img/report-issue/lippEroln1BVVVPi.jpg"
          }
      ],
      "is_image_valid": 1
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The report id field is required."
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

