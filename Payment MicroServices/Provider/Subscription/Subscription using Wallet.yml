info:
  name: Subscription using Wallet
  type: http
  seq: 2

http:
  method: POST
  url: "{{payment_url}}/api/provider/subscription/purchase"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{PROVIDER_BEARER_TOKEN}}
      disabled: true
  body:
    type: json
    data: |-
      {
          "subscription_id": "{{SUBSCRIPTION_PLAN_UUID}}",
          "payment_type": 3
      }
  auth:
    type: bearer
    token: "{{provider_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
