          value: no-cache, private
        - name: Date
          value: Fri, 13 Mar 2026 08:11:36 GMT
        - name: Access-Control-Allow-Origin
          value: "*"
        - name: X-Frame-Options
          value: SAMEORIGIN
        - name: X-Content-Type-Options
          value: nosniff
        - name: X-XSS-Protection
          value: 1; mode=block
