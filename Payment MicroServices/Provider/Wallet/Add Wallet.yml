info:
  name: Add Wallet
  type: http
  seq: 1

http:
  method: POST
  url: "{{payment_url}}/api/provider/wallet/add"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
          "amount": 100.00,
          "card_id": "019d85bc-0c7d-732b-aea1-faee9ae87808"
        }
  auth:
    type: bearer
    token: "{{provider_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Add Wallet
    request:
      url: "{{payment_url}}/api/provider/wallet/add"
      method: POST
      headers:
        - name: Authorization
          value: Bearer YOUR_TOKEN
          disabled: true
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
              "amount": 100.00,
              "card_id": "{{card_id}}"
            }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Server
          value: nginx
        - name: Content-Type
          value: application/json
        - name: Transfer-Encoding
          value: chunked
        - name: Connection
          value: keep-alive
        - name: Vary
          value: Accept-Encoding
        - name: X-Powered-By
          value: PHP/8.3.30
        - name: Cache-Control
          value: no-cache, private
        - name: Date
          value: Fri, 13 Mar 2026 05:34:04 GMT
        - name: Access-Control-Allow-Origin
          value: "*"
        - name: X-Frame-Options
          value: SAMEORIGIN
        - name: X-Content-Type-Options
          value: nosniff
        - name: X-XSS-Protection
          value: 1; mode=block
        - name: Referrer-Policy
          value: strict-origin-when-cross-origin
        - name: Content-Encoding
          value: gzip
      body:
        type: json
        data: |-
          {
              "success": true,
              "message": "Success",
              "message_code": 1,
              "status_code": 1,
              "http_status_code": 200,
              "wallet_balance": 100,
              "redirect_url": "",
              "success_url": "",
              "failed_url": "",
              "error_url": ""
          }

docs: |+
  ## Add Wallet

  Creates a new record with the provided details.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (JSON)

  ```json
  {
      "amount": 100.00,
      "card_id": "{{card_id}}"
    }
  ```

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "wallet_balance": 100,
      "redirect_url": "",
      "success_url": "",
      "failed_url": "",
      "error_url": ""
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

