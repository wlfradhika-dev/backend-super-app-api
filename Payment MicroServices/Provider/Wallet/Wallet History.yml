docs: |+
  ## Wallet History

  Returns the historical records for the authenticated user.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `order_by` | string | Yes | Order by |
  | `service_category` | string | No | Nullable |
  | `date_filter` | string | Yes | Date filter |
  | `page` | string | Yes | Page |
  | `per_page` | string | Yes | Per page |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "wallet_transaction_list": [
          {
              "id": "31345530-a255-4be2-80f8-8869446818af",
              "amount": 100,
              "transaction_type": 1,
              "title": "Credit by Monica",
              "remaining_balance": 100,
              "date_time": "2026-03-13 05:34:04"
          }
      ],
      "current_page": 1,
      "last_page": 1,
      "total_rec": 1
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The order by field is required."
  }
  ```

