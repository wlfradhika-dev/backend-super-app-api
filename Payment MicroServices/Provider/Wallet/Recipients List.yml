docs: |+
  ## Recipients List

  Returns a paginated list of records matching the request criteria.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (JSON)

  ```json
  {
     "search": "1030"
  }
  ```

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "general_message.1",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "transfer_user_list": [
          {
              "transfer_id": "dc477e3d-c8c7-40e2-8c7e-a4d00b453457",
              "name": "Charlie",
              "email": "charlie@gmail.co",
              "profile_image": "",
              "country_code": "+1",
              "contact_number": "1030"
          }
      ]
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

