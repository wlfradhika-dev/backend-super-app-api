docs: |+
  ## history

  Returns the historical records for the authenticated user.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `order_by` | string | Yes | 0,1 = credit,2 = debit |
  | `service_category` | string | No | nullable |
  | `date_filter` | string | Yes | 1 = today, 2 = 7 days, 3 = 15 days, 4 = This month, 5 This year, 6 = Last year,7 = All |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success.",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "wallet_transaction_list": [
          {
              "id": "e8081148-e059-4ae8-b60b-1129660dd2db",
              "amount": 100,
              "transaction_type": 2,
              "title": "Wallet Amount Transfer to  Provider",
              "remaining_balance": 2200,
              "date_time": "2026-03-14 04:32:40"
          },
          {
              "id": "dc68ef5a-8ffd-4261-905c-1548086e0ceb",
              "amount": 200,
              "transaction_type": 1,
              "title": "Credit by Rahul",
              "remaining_balance": 2300,
              "date_time": "2026-03-14 04:31:31"
          },
          {
              "id": "76c213c2-4111-4bf3-abd7-8ac5c33a5f53",
              "amount": 100,
              "transaction_type": 1,
              "title": "Credit by Rahul",
              "remaining_balance": 2100,
              "date_time": "2026-03-14 04:29:34"
          },
          {
              "id": "8a28de9e-d6a3-488d-a148-e4c3dd583ab2",
              "amount": 2000,
              "transaction_type": 1,
              "title": "Credit by Rahul",
              "remaining_balance": 2000,
              "date_time": "2026-03-14 04:28:51"
          }
      ],
      "current_page": 1,
      "last_page": 1,
      "total_rec": 4
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The order by field is required."
  }
  ```

