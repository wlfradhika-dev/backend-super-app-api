docs: |+
  ## recipients-list

  Returns a paginated list of records matching the request criteria.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `search` | string | Yes | Search |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success.",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "transfer_user_list": [
          {
              "transfer_id": "80e42040-a9df-4d89-af4e-ec0f49a15180",
              "name": "Provider",
              "email": "provider@gmail.com",
              "profile_image": "",
              "country_code": "+1",
              "contact_number": "5099"
          }
      ]
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The search field is required."
  }
  ```

