docs: |+
  ## Pool Payment

  Processes the payment for the specified order or service.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `ride_id` | string | Yes | (For Pool Ride id) |
  | `service_category_id` | string | Yes | (For Service Category id (6 = Pool ) |
  | `payment_type` | string | Yes | For(Payment Type = 1 = Cash , 2 = Card ,3 = Wallet) |
  | `card_id` | string | Yes | if (Payment Type = 2 then Card_id Required) |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "ride_id": "f1a2b3c4-d5e6-7890-abcd-aaa000000001",
      "ride_no": "10000005",
      "redirect_url": "",
      "success_url": "",
      "failed_url": ""
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The ride id field is required."
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

