      value: application/json
  body:
    type: multipart-form
    data:
      - name: ride_id
        type: text
        value: f1a2b3c4-d5e6-7890-abcd-aaa000000001
        description: (For Pool Ride id)
      - name: service_category_id
        type: text
        value: "6"
        description: (For Service Category id (6 = Pool )
      - name: payment_type
        type: text
        value: "3"
        description: For(Payment Type = 1 = Cash , 2 = Card ,3 = Wallet)
      - name: card_id
        type: text
        value: 09ae7659-7599-4ee2-93da-e91feb2b4549
        description: if (Payment Type = 2 then Card_id Required)
        disabled: true
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

