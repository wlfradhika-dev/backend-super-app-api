docs: |+
  ## list

  Returns a paginated list of records matching the request criteria.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success.",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "card_list": [
          {
              "card_id": "42071056-cb1f-4a70-9eb5-e530fdf49325",
              "holder_name": "John Doe",
              "card_number": "4141414141414141"
          },
          {
              "card_id": "e884e93b-1afc-4726-a87c-79684d3827c5",
              "holder_name": "John Doe",
              "card_number": "4111111111111111"
          }
      ]
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

