info:
  name: list
  type: http
  seq: 2

http:
  method: POST
  url: "{{payment_url}}/api/customer/card/list"
  headers:
    - name: Authorization
      value: Bearer YOUR_TOKEN
      disabled: true
    - name: Content-Type
      value: application/json
  body:
    type: multipart-form
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: success-response
    request:
      url: http://localhost:8006/api/customer/card/list
      method: POST
      headers:
        - name: Authorization
          value: Bearer YOUR_TOKEN
          disabled: true
        - name: Content-Type
          value: application/json
      body:
        type: multipart-form
    response:
      status: 200
      statusText: OK
      headers:
        - name: cache-control
          value: no-cache, private
        - name: content-type
          value: application/json
      body:
        type: json
        data: |-
          {
              "success": true,
              "message": "Success.",
              "message_code": 1,
              "status_code": 1,
              "http_status_code": 200,
              "card_list": [
