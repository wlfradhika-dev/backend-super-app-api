info:
  name: add
  type: http
  seq: 1

http:
  method: POST
  url: "{{payment_url}}/api/customer/card/add"
  body:
    type: multipart-form
    data:
      - name: holder_name
        type: text
        value: John Doe
      - name: card_number
        type: text
        value: "4141414141414141"
      - name: month
        type: text
        value: "12"
      - name: year
        type: text
        value: "2027"
      - name: cvv
        type: text
        value: "123"
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: success-response
    request:
      url: http://localhost:8006/api/customer/card/add
      method: POST
      headers:
        - name: Authorization
          value: Bearer YOUR_TOKEN
          disabled: true
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
              "holder_name": "John Doe",
              "card_number": "4111111111111111",
              "month": "12",
              "year": "2027",
              "cvv": "123"
            }
    response:
      status: 200
      statusText: OK
      headers:
        - name: cache-control
          value: no-cache, private
        - name: content-type
          value: application/json
      body:
        type: json
        data: |-
          {
              "success": true,
              "message": "Success.",
              "message_code": 1,
              "status_code": 1,
              "http_status_code": 200,
              "card_id": "e884e93b-1afc-4726-a87c-79684d3827c5",
              "holder_name": "John Doe",
              "card_number": "4111111111111111",
              "month": 12,
              "year": 2027,
              "cvv": 123
          }

docs: |+
  ## add

  Creates a new record with the provided details.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `holder_name` | string | Yes | Holder name |
  | `card_number` | string | Yes | Card number |
  | `month` | string | Yes | Month |
  | `year` | string | Yes | Year |
  | `cvv` | string | Yes | Cvv |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success.",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "card_id": "e884e93b-1afc-4726-a87c-79684d3827c5",
      "holder_name": "John Doe",
      "card_number": "4111111111111111",
      "month": 12,
      "year": 2027,
      "cvv": 123
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The holder name field is required."
  }
  ```

  **404 Not Found — User Not Found**

  ```json
  {
      "success": false,
      "message": "App User Not Found",
      "message_code": 5,
      "status_code": 5,
      "https_status_code": 404,
      "errors": "Failed"
  }
  ```

