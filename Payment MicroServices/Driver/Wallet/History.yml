docs: |+
  ## History

  Returns the historical records for the authenticated user.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `order_by` | string | Yes | 0,1,2 |
  | `service_category` | string | No | null or category pass like 1,2,3 |
  | `date_filter` | string | Yes | 0,1,2,3,4,5,6,7 |
  | `page` | string | Yes | Page |
  | `per_page` | string | Yes | Per page |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "wallet_transaction_list": [
          {
              "id": "6f107363-bafc-4c7b-a01b-acef92fc7111",
              "amount": 100,
              "transaction_type": 1,
              "title": "Credit by Suv",
              "remaining_balance": 100,
              "date_time": "2026-02-18 07:36:11"
          }
      ],
      "current_page": 1,
      "last_page": 1,
      "total_rec": 1
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The order by field is required."
  }
  ```

