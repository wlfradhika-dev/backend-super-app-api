info:
  name: Recipients List
  type: http
  seq: 4

http:
  method: POST
  url: "{{payment_url}}/api/driver/wallet/recipients-list"
  headers:
    - name: Accept
      value: application/json
  body:
    type: multipart-form
    data:
      - name: search
        type: text
        value: "9"
        description: email, country_code, contact_number
  auth:
    type: bearer
    token: "{{driver_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

