http:
  method: POST
  url: "{{payment_url}}/api/driver/pool/invoice"
  headers:
    - name: Accept
      value: application/json
  body:
    type: multipart-form
    data:
      - name: ride_id
        type: text
        value: e5f6a7b8-c9d0-1234-efab-555555555555
        description: (For Taxi Pool Id)
  auth:
    type: bearer
    token: "{{driver_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

