docs: |+
  ## Taxi Bidding

  Processes the payment for the specified order or service.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `ride_id` | string | Yes | (For Taxi Biding ride Id) |
  | `service_category_id` | string | Yes | (Service Category id = 5 For Taxi BIdding) |

  ---

  ### Responses

