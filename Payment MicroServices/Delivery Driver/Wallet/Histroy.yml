docs: |+
  ## Histroy

  Returns the historical records for the authenticated user.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `order_by` | string | Yes | Order by |
  | `service_category` | string | Yes | Service category |
  | `date_filter` | string | Yes | Date filter |
  | `page` | string | Yes | Page |
  | `per_page` | string | Yes | Per page |

  ---

