docs: |+
  ## Recipients -list

  Returns a paginated list of records matching the request criteria.

  ### Authentication

  Requires a valid **Bearer Token** in the `Authorization` header.

  ```
  Authorization: Bearer {token}
  ```

  ---

  ### Request Body (form-data)

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `search` | string | Yes | Search |

  ---

  ### Responses

  **200 OK — Success**

  ```json
  {
      "success": true,
      "message": "Success.",
      "message_code": 1,
      "status_code": 1,
      "http_status_code": 200,
      "transfer_user_list": [
          {
              "transfer_id": "0c7f4dfd-ea4e-4cc9-8c79-0313aa15ccfc",
              "name": "Rahul",
              "email": "rahul@gmail.co",
              "profile_image": "http://localhost:8006/storage/img/profile-images/customer/12332.jpg",
              "country_code": "+91",
              "contact_number": "99******99"
          },
          {
              "transfer_id": "adb97f58-cb8a-4e4a-9535-b87edac62a10",
              "name": "Provider",
              "email": "provider@gmail.commmm",
              "profile_image": "http://localhost:8006/storage/img/profile-images/provider/jila.png",
              "country_code": "+1",
              "contact_number": "5099"
          },
          {
              "transfer_id": "f19b6bcd-089f-400f-919c-543881420b89",
              "name": "Rahul",
              "email": "rahul@gmail.comm",
              "profile_image": "",
              "country_code": "+1",
              "contact_number": "1234"
          }
      ]
  }
  ```

  **401 Unauthorized — App Access Denied**

  ```json
  {
      "success": false,
      "message": "App access denied",
      "message_code": 2,
      "status_code": 0,
      "https_status_code": 401,
      "errors": "Failed"
  }
  ```

  **422 Unprocessable Entity — Validation Failed**

  ```json
  {
      "status": 0,
      "message": "The search field is required."
  }
  ```

